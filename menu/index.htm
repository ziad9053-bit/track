<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <title>القائمة</title>

  <style>
    body {
      font-family: "Tajawal", sans-serif;
      background: #000;
      color: #fff;
      margin: 0;
      padding: 20px;
      direction: rtl;
    }

    h2 {
      text-align: center;
      color: #d4af37;
      margin-bottom: 20px;
      font-size: 26px;
      font-weight: 700;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 15px;
    }

    .card {
      background: rgba(255,255,255,0.06);
      padding: 12px;
      border-radius: 12px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
      transition: 0.2s;
    }

    .card:hover {
      background: rgba(255,255,255,0.12);
      transform: scale(1.03);
      box-shadow: 0 0 12px rgba(212,175,55,0.25);
    }

    .card img {
      width: 100%;
      height: 130px;
      object-fit: cover;
      border-radius: 10px;
    }

    .name {
      margin-top: 10px;
      font-size: 18px;
      color: #fff;
      font-weight: 600;
    }

    .price {
      color: #d4af37;
      margin: 6px 0;
      font-size: 16px;
      font-weight: 700;
    }

    .desc {
      margin-top: 6px;
      font-size: 14px;
      opacity: 0.8;
      line-height: 1.5;
      min-height: 40px;
    }

    .btn {
      background: #d4af37;
      color: #000;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      border: none;
      width: 100%;
      margin-top: 10px;
      transition: 0.2s;
    }

    .btn:hover {
      background: #f1d67a;
      transform: scale(1.05);
    }

    .cart-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #d4af37;
      color: #000;
      padding: 12px 20px;
      border-radius: 50px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 12px rgba(212,175,55,0.4);
    }
  </style>
</head>

<body>

  <h2 id="title">القائمة</h2>

  <div class="products" id="products"></div>

  <button class="cart-btn" onclick="goToCart()">السلة 🛒</button>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabase = createClient(
      "https://motikwjgfgmegekygswy.supabase.co",
      "ضع_المفتاح_هنا"
    );

    // قراءة category من الرابط
    const params = new URLSearchParams(window.location.search);
    const category = params.get("category");

    const titles = {
      hot: "المشروبات الساخنة",
      cold: "المشروبات الباردة",
      sweets: "الحلويات"
    };

    document.getElementById("title").textContent = titles[category] || "القائمة";

    async function loadProducts() {
      const { data, error } = await supabase
        .from("products")
        .select("*")
        .eq("category_code", category);

      if (error) {
        console.error(error);
        return;
      }

      const container = document.getElementById("products");
      container.innerHTML = "";

      data.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <img src="${item.image_url}" alt="">
          <div class="name">${item.name_ar}</div>
          <div class="price">${item.price} ريال</div>
          <div class="desc">${item.description || ""}</div>
          <button class="btn" onclick='addToCart(${JSON.stringify(item)})'>إضافة للسلة</button>
        `;

        container.appendChild(card);
      });
    }

    window.addToCart = function(item) {
      let cart = JSON.parse(localStorage.getItem("cart") || "[]");

      const existing = cart.find(i => i.id === item.id);
      if (existing) {
        existing.qty += 1;
      } else {
        cart.push({ ...item, qty: 1 });
      }

      localStorage.setItem("cart", JSON.stringify(cart));
      alert("تمت الإضافة إلى السلة");
    };

    window.goToCart = function() {
      window.location.href = "../cart/";
    };

    loadProducts();
  </script>

</body>
</html>
