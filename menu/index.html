  // دالة الإضافة التي لا تطلب QR Code
  window.addItem = async function(id, price) {
    let orderCode = localStorage.getItem("currentOrderCode");

    // 1. إذا لم يوجد طلب مخزن، أنشئ واحداً جديداً تلقائياً
    if (!orderCode) {
      orderCode = "RR-" + Math.floor(1000 + Math.random() * 9000);
      localStorage.setItem("currentOrderCode", orderCode);
      
      const { error: insertErr } = await supabase.from("orders").insert({
        order_code: orderCode,
        status: "pending",
        total: 0
      });
      if (insertErr) return alert("خطأ في إنشاء الطلب، حاول مجدداً.");
    }

    // 2. جلب معرف الطلب (ID) لإضافة الصنف إليه
    const { data: order, error: fetchErr } = await supabase
      .from("orders")
      .select("id")
      .eq("order_code", orderCode)
      .single();

    if (fetchErr) {
        // إذا فشل الجلب، امسح الكود القديم وأعد المحاولة
        localStorage.removeItem("currentOrderCode");
        return alert("حدث خطأ، يرجى الضغط مرة أخرى.");
    }

    // 3. إضافة الصنف
    await supabase.from("order_items").insert({
      order_id: order.id,
      item_id: id,
      quantity: 1,
      price: price
    });
    
    alert("✅ تمت الإضافة للسلة!");
  };
