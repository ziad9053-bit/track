        async function fetchMenu() {
            const container = document.getElementById("itemsContainer");
            
            // استخدام sb بدلاً من supabase
            const { data: items, error } = await sb.from("items").select("*").eq("category", currentCategory);
            
            if (error) {
                console.error("خطأ Supabase:", error);
                container.innerHTML = "خطأ في تحميل البيانات: " + error.message;
                return;
            }

            if (!items || items.length === 0) {
                container.innerHTML = "لا توجد أصناف في هذا القسم.";
                return;
            }

            container.innerHTML = "";
            items.forEach(item => {
                container.innerHTML += `<div>${item.name_ar || 'بدون اسم'} - ${item.price || 0} ريال 
                    <button onclick="addItem('${item.id}', ${item.price})">إضافة</button></div>`;
            });
        }
