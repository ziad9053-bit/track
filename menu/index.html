    <script>
        // 2. تعريف db بشكل عالمي (Global) ليراه أي كود في الصفحة
        const db = window.supabase.createClient(
            "https://motikwjgfgmegekygswy.supabase.co",

        );

        // 3. دالة الإضافة (مدمجة هنا لضمان رؤيتها لـ db)
        async function addItem(id, price, element) {
            if (element.dataset.added === "true") return;

            const orderId = localStorage.getItem("currentOrderId");
            const orderCode = localStorage.getItem("currentOrderCode");

            if (!orderId || !orderCode) {
                alert("حدث خطأ: لم يتم إنشاء الطلب. يرجى مسح QR مجدداً.");
                return;
            }

            try {
                const { error } = await db.from("order_items").insert({
                    order_id: orderId,
                    item_id: id,
                    quantity: 1,
                    price: price
                });

                if (error) throw error;

                element.dataset.added = "true";
                const badge = document.createElement("div");
                badge.textContent = "✓ تمت الإضافة";
                element.appendChild(badge);
                
                // تأكد أن هذه الدالة معرفة في مكان آخر أو احذف السطر إذا لم تكن موجودة
                if (typeof updateCartBadge === 'function') updateCartBadge();
                
            } catch (err) {
                console.error("خطأ:", err);
                alert("فشل الاتصال بقاعدة البيانات.");
            }
        }

        // 4. تحميل الأصناف عند فتح الصفحة
        async function loadMenu() {
            const { data, error } = await db.from("items").select("*");
            if (error) {
                document.getElementById("itemsContainer").innerHTML = "خطأ في تحميل البيانات.";
                return;
            }
            // ... (هنا يتم عرض العناصر في الصفحة)
        }

        loadMenu();
    </script>
