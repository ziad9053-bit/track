<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>القائمة - Ritzy Roast</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      background: #000;
      color: #fff;
      font-family: "Tajawal", sans-serif;
      direction: rtl;
      margin: 0;
      padding: 20px;
    }

    h2 {
      color: #d4af37;
      font-weight: 700;
      margin-bottom: 20px;
      text-align: center;
    }

    .item-row {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(212,175,55,0.2);
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: 0.3s;
    }

    .item-row:hover {
      border-color: #d4af37;
      box-shadow: 0 0 15px rgba(212,175,55,0.3);
    }

    .item-img {
      width: 80px;
      height: 80px;
      border-radius: 10px;
      object-fit: cover;
      margin-left: 12px;
      border: 1px solid #d4af37;
    }

    .item-info {
      flex: 1;
    }

    .item-name {
      font-size: 18px;
      font-weight: 700;
      color: #d4af37;
      margin-bottom: 4px;
    }

    .item-desc {
      font-size: 14px;
      color: #ccc;
      margin-bottom: 6px;
    }

    .item-price {
      font-size: 16px;
      font-weight: 700;
      color: #5cb85c;
    }
  </style>
</head>

<body>

  <h2 id="menuTitle">القائمة</h2>
  <div id="menuList">جاري تحميل القائمة...</div>

  <script>
    const db = supabase.createClient(
      "https://motikwjgfgmegekygswy.supabase.co",
      "sb_publishable_yjL5niVoL8Rtr2gF4i2J1w_T1TCjpEI"
    );

    const params = new URLSearchParams(window.location.search);
    const category = params.get("category") || "hot";

    document.getElementById("menuTitle").textContent =
      category === "hot" ? "☕ المشروبات الساخنة"
      : category === "cold" ? "🥤 المشروبات الباردة"
      : "🍰 الحلويات";

    async function fetchMenu() {
      const { data, error } = await db
        .from("items")
        .select("*")
        .eq("category", category);

      const box = document.getElementById("menuList");
      box.innerHTML = "";

      if (error) {
        box.innerHTML = "فشل تحميل القائمة.";
        return;
      }

      if (!data || data.length === 0) {
        box.innerHTML = "<p style='opacity:0.6;'>لا توجد منتجات.</p>";
        return;
      }

      data.forEach(item => {
        box.innerHTML += `
          <div class="item-row" onclick="addItem(${item.id}, ${item.price})">
            <img src="${item.image_url}" class="item-img">
            <div class="item-info">
              <div class="item-name">${item.name_ar}</div>
              <div class="item-desc">${item.description || ""}</div>
              <div class="item-price">${item.price} ريال</div>
            </div>
          </div>
        `;
      });
    }

    async function addItem(id, price) {
      let orderCode = localStorage.getItem("currentOrderCode");

      if (!orderCode) {
        orderCode = "RR-" + Math.floor(1000 + Math.random() * 9000);
        localStorage.setItem("currentOrderCode", orderCode);

        await db.from("orders").insert({
          order_code: orderCode,
          status: "pending",
          total: 0
        });
      }

      const { data: order } = await db
        .from("orders")
        .select("id")
        .eq("order_code", orderCode)
        .maybeSingle();

      await db.from("order_items").insert({
        order_id: order.id,
        item_id: id,
        quantity: 1,
        price: price
      });

      alert("تمت الإضافة للسلة!");
    }

    fetchMenu();
  </script>

</body>
</html>
