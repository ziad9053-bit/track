<script>
  // تعريف الـ supabase مرة واحدة فقط
  const supabase = supabase.createClient(
    "https://motikwjgfgmegekygswy.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1vdGlrd2pnZmdtZWdla3lnc3d5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNzc4MjQsImV4cCI6MjA5NDk1MzgyNH0.GWGDZ-WvjUeTLmgIfQxt6zDhZwN1C9GCHUh75ggSVdo"
  );

  window.addItem = async function(id, price) {
    let orderCode = localStorage.getItem("currentOrderCode");
    
    // إنشاء طلب جديد إذا لم يوجد
    if (!orderCode) {
      orderCode = "RR-" + Math.floor(1000 + Math.random() * 9000);
      localStorage.setItem("currentOrderCode", orderCode);
      await supabase.from("orders").insert({ order_code: orderCode, status: "pending" });
    }

    const { data: order } = await supabase.from("orders").select("id").eq("order_code", orderCode).single();
    if (order) {
        await supabase.from("order_items").insert({ order_id: order.id, item_id: id, quantity: 1, price: price });
        alert("✅ تمت الإضافة للسلة!");
    }
  };

  async function fetchMenu() {
    const { data: items } = await supabase.from("items").select("*");
    const container = document.getElementById("itemsContainer");
    if (!container) return;
    container.innerHTML = "";
    items.forEach(item => {
        container.innerHTML += `<div>${item.name_ar} - ${item.price} ريال <button onclick="addItem('${item.id}', ${item.price})">إضافة</button></div>`;
    });
  }
  
  fetchMenu();
</script>
