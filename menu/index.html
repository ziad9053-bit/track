<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>القائمة - Ritzy Roast</title>
  <style>
    body { background-color: #000000; color: #ffffff; font-family: sans-serif; margin: 0; padding-bottom: 80px; text-align: center; }
    h2 { color: #d4af37; padding: 20px 0; margin: 0; }
    .products { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px; max-width: 480px; margin: 0 auto; box-sizing: border-box; }
    .card { background-color: #111111; border: 1px solid #222222; padding: 12px; border-radius: 10px; display: flex; flex-direction: column; justify-content: space-between; }
    .card img { width: 100%; height: 110px; object-fit: cover; border-radius: 8px; }
    .title-item { margin: 8px 0 4px 0; font-weight: bold; font-size: 15px; text-align: right; }
    .price { color: #d4af37; font-weight: bold; margin-bottom: 8px; text-align: right; }
    .btn { background-color: #c5a059; color: #000000; border: none; padding: 10px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; }
    .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background-color: #111111; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333333; box-sizing: border-box; }
    .bottom-nav a { color: #d4af37; text-decoration: none; font-size: 14px; font-weight: bold; }
  </style>
</head>
<body>

  <h2 id="titleHeader">☕ المشروبات الساخنة</h2>
  <div class="products" id="productsContainer">جاري تحميل تشكيلة Ritzy Roast...</div>

  <div class="bottom-nav">
    <a href="../index.html">🏠 الرئيسية</a>
    <a href="?category=hot">☕ ساخنة</a>
    <a href="?category=cold">🥤 باردة</a>
    <a href="?category=sweets">🍰 حلويات</a>
    <a href="../cart/index.html">🛒 السلة</a>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
    const supabase = createClient("https://motikwjgfgmegekygswy.supabase.co", "sb_publishable_yjL5niVoL8Rtr2gF4i2J1w_T1TCjpEI");

    const category = new URLSearchParams(window.location.search).get("category") || "hot";
    const titles = { hot: "☕ المشروبات الساخنة", cold: "🥤 المشروبات الباردة", sweets: "🍰 الحلويات الفاخرة" };
    document.getElementById("titleHeader").textContent = titles[category] || "القائمة";

    async function loadItems() {
      const container = document.getElementById("productsContainer");
      try {
        const { data, error } = await supabase.from("items").select("*").eq("category", category);
        if (error) throw error;
        container.innerHTML = "";
        
        if (!data || data.length === 0) {
          container.innerHTML = "<p style='grid-column: 1/-1;'>لا توجد أصناف حالياً في هذا القسم.</p>";
          return;
        }
        
        data.forEach(item => {
          const img = item.image_url || "https://motikwjgfgmegekygswy.supabase.co/storage/v1/object/public/products/logo/logo.webp";
          container.innerHTML += `
            <div class="card">
              <img src="${img}" onerror="this.src='https://motikwjgfgmegekygswy.supabase.co/storage/v1/object/public/products/logo/logo.webp'">
              <div class="title-item">${item.name_ar || 'صنف'}</div>
              <div class="price">${item.price || 0} ريال</div>
              <button class="btn" onclick="addToCart('${item.id}', ${item.price})">إضافة 🛒</button>
            </div>`;
        });
      } catch (err) {
        console.error(err);
        container.innerHTML = "<p style='grid-column: 1/-1;'>خطأ في جلب البيانات من السيرفر.</p>";
      }
    }

    window.addToCart = function(id, price) {
      let cart = JSON.parse(localStorage.getItem("ritzy_cart")) || [];
      let item = cart.find(i => i.id === id);
      if (item) item.quantity++; else cart.push({ id, price, quantity: 1 });
      localStorage.setItem("ritzy_cart", JSON.stringify(cart));
      alert("تمت الإضافة للسلة بنجاح! ✨");
    };

    loadItems();
  </script>
</body>
</html>
