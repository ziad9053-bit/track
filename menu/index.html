<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>المنيو</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { font-family: "Tajawal", sans-serif; background: #000; color: #fff; margin: 0; padding-bottom: 80px; }
        .items { display: flex; flex-direction: column; gap: 15px; padding: 20px; }
        .card { display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.06); padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .card img { width: 80px; height: 80px; object-fit: cover; border-radius: 10px; }
        .info { flex-grow: 1; text-align: right; }
        .name { font-size: 18px; font-weight: bold; }
        .price { color: #d4af37; font-size: 16px; margin-top: 5px; }
        .btn { background: #d4af37; color: #000; padding: 8px 15px; border-radius: 8px; cursor: pointer; border: none; font-weight: bold; }
        
        /* الشريط السفلي */
        #bottomNav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #111; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; z-index: 1000; }
        #bottomNav a { color: #fff; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

    <h2 id="title" style="text-align: center; color: #d4af37;">القائمة</h2>
    <div id="itemsContainer" class="items">جاري تحميل المنيو...</div>

    <div id="bottomNav">
        <a href="index.html">الرئيسية</a>
        <a href="?category=cold">بارد</a>
        <a href="?category=hot">ساخن</a>
        <a href="cart.html">السلة</a>
    </div>

    <script>
        const db = supabase.createClient(
            "https://motikwjgfgmegekygswy.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1vdGlrd2pnZmdtZWdla3lnc3d5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNzc4MjQsImV4cCI6MjA5NDk1MzgyNH0.GWGDZ-WvjUeTLmgIfQxt6zDhZwN1C9GCHUh75ggSVdo"
        );

        const params = new URLSearchParams(window.location.search);
        const category = params.get("category");

        async function loadMenu() {
            // جلب البيانات مع فلترة حسب التصنيف إن وجد
            let query = db.from("items").select("*");
            if (category) query = query.eq("category", category);
            
            const { data, error } = await query;

            if (error) {
                document.getElementById("itemsContainer").innerHTML = "خطأ في تحميل البيانات.";
                return;
            }

            const container = document.getElementById("itemsContainer");
            container.innerHTML = "";

            data.forEach(item => {
                const card = document.createElement("div");
                card.className = "card";
                card.innerHTML = `
                    <img src="${item.image_url}" alt="">
                    <div class="info">
                        <div class="name">${item.name_ar}</div>
                        <div class="price">${item.price} ريال</div>
                    </div>
                    <button class="btn" onclick='addItem(${item.id}, ${item.price}, this)'>إضافة</button>
                `;
                container.appendChild(card);
            });
        }

        async function addItem(id, price, element) {
            const orderId = localStorage.getItem("currentOrderId");
            if (!orderId) { alert("يرجى مسح QR الطاولة أولاً."); return; }
            
            element.textContent = "جاري...";
            await db.from("order_items").insert({ order_id: orderId, item_id: id, quantity: 1, price: price });
            element.textContent = "✓ تمت";
        }

        loadMenu();
    </script>
</body>
</html>
