  const urlParams = new URLSearchParams(window.location.search);

  // إضافة صنف للطلب
  window.addItem = async function(id, price) {
    if (!id || !price) {
      alert("خطأ: بيانات الصنف غير صحيحة");
      return;
    }

    let orderCode = localStorage.getItem("currentOrderCode");

    // 1) إنشاء طلب جديد إذا لم يوجد
    if (!orderCode) {
      orderCode = "RR-" + Math.floor(1000 + Math.random() * 9000);
      localStorage.setItem("currentOrderCode", orderCode);

      const { error: orderErr } = await db
        .from("orders")
        .insert({
          order_code: orderCode,
          status: "pending",
          total: 0
        });

      if (orderErr) {
        localStorage.removeItem("currentOrderCode");
        alert("فشل إنشاء الطلب، حاول مرة أخرى");
        return;
      }
    }

    // 2) جلب ID الطلب
    const { data: order, error: fetchErr } = await db
      .from("orders")
      .select("id")
      .eq("order_code", orderCode)
      .maybeSingle();

    if (fetchErr || !order) {
      localStorage.removeItem("currentOrderCode");
      alert("تعذر العثور على الطلب، يرجى إعادة المحاولة");
      return;
    }

    // 3) إضافة الصنف
    const { error: itemErr } = await db
      .from("order_items")
      .insert({
        order_id: order.id,
        item_id: id,
        quantity: 1,
        price: price
      });

    if (itemErr) {
      alert("فشل إضافة الصنف للسلة");
      return;
    }

    alert("✅ تمت الإضافة للسلة!");
  };

  // تشغيل المنيو

</script>
