<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>المنيو</title>
    <script src="https://esm.sh/@supabase/supabase-js@2"></script>

    <style>
        body {
            font-family: "Tajawal", sans-serif;
            background: #000;
            color: #fff;
            margin: 0;
            padding: 20px;
        }

        .items {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
        }

        .card {
            background: rgba(255,255,255,0.06);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.2s;
        }

        .card:hover {
            background: rgba(255,255,255,0.12);
            transform: scale(1.03);
        }

        .card img {
            width: 100%;
            height: 130px;
            object-fit: cover;
            border-radius: 10px;
        }

        .name {
            margin-top: 10px;
            font-size: 18px;
        }

        .price {
            color: #d4af37;
            margin: 5px 0;
            font-size: 16px;
        }

        .btn {
            background: #d4af37;
            color: #000;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            border: none;
            width: 100%;
            margin-top: 8px;
        }
    </style>
</head>

<body>

    <h2 id="title">القائمة</h2>

    <div id="itemsContainer" class="items">جاري تحميل المنيو...</div>

    <script>
        const db = window.supabase.createClient(
            "https://motikwjgfgmegekygswy.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1vdGlrd2pnZmdtZWdla3lnc3d5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNzc4MjQsImV4cCI6MjA5NDk1MzgyNH0.GWGDZ-WvjUeTLmgIfQxt6zDhZwN1C9GCHUh75ggSVdo"
        );

        // قراءة category من الرابط
        const params = new URLSearchParams(window.location.search);
        const category = params.get("category");

        const titles = {
            hot: "المشروبات الساخنة",
            cold: "المشروبات الباردة",
            sweets: "الحلويات"
        };

        document.getElementById("title").textContent = titles[category] || "القائمة";

        // تحميل الأصناف حسب الفئة
        async function loadMenu() {
            const { data, error } = await db
                .from("items")
                .select("*")
                .eq("category", category);

            if (error) {
                document.getElementById("itemsContainer").innerHTML = "خطأ في تحميل البيانات.";
                return;
            }

            const container = document.getElementById("itemsContainer");
            container.innerHTML = "";

            data.forEach(item => {
                const card = document.createElement("div");
                card.className = "card";

                card.innerHTML = `
                    <img src="${item.image_url}" alt="">
                    <div class="name">${item.name_ar}</div>
                    <div class="price">${item.price} ريال</div>
                    <button class="btn" onclick='addItem(${item.id}, ${item.price}, this)'>إضافة للسلة</button>
                `;

                container.appendChild(card);
            });
        }

        // دالة إضافة للسلة
        async function addItem(id, price, element) {
            if (element.dataset.added === "true") return;

            const orderId = localStorage.getItem("currentOrderId");
            const orderCode = localStorage.getItem("currentOrderCode");

            if (!orderId || !orderCode) {
                alert("حدث خطأ: لم يتم إنشاء الطلب. يرجى مسح QR مجدداً.");
                return;
            }

            await db.from("order_items").insert({
                order_id: orderId,
                item_id: id,
                quantity: 1,
                price: price
            });

            element.dataset.added = "true";
            element.textContent = "✓ تمت الإضافة";
        }

        loadMenu();
    </script>

</body>
</html>
