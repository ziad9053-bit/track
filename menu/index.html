<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>القائمة - Ritzy Roast</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      background: #000;
      color: #fff;
      font-family: "Tajawal", sans-serif;
      direction: rtl;
      margin: 0;
      padding: 20px;
      padding-bottom: 120px;
    }

    h2 {
      color: #d4af37;
      font-weight: 700;
      margin-bottom: 20px;
      text-align: center;
    }

    .item-row {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(212,175,55,0.2);
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: 0.3s;
    }

    .item-row:hover {
      border-color: #d4af37;
      box-shadow: 0 0 15px rgba(212,175,55,0.3);
    }

    .item-img {
      width: 80px;
      height: 80px;
      border-radius: 10px;
      object-fit: cover;
      margin-left: 12px;
      border: 1px solid #d4af37;
    }

    .item-info {
      flex: 1;
    }

    .item-name {
      font-size: 18px;
      font-weight: 700;
      color: #d4af37;
      margin-bottom: 4px;
    }

    .item-desc {
      font-size: 14px;
      color: #ccc;
      margin-bottom: 6px;
    }

    .item-price {
      font-size: 16px;
      font-weight: 700;
      color: #5cb85c;
    }

    /* شارة تمت الإضافة */
    .added-badge {
      background: #5cb85c;
      color: #000;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      margin-top: 6px;
      display: inline-block;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }

    /* الشريط السفلي */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: #111;
      border-top: 1px solid #333;
      display: flex;
      justify-content: space-around;
      padding: 12px 0;
      z-index: 999;
    }

    .nav-item {
      color: #d4af37;
      font-size: 14px;
      text-decoration: none;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      opacity: 0.8;
      transition: 0.2s;
      cursor: pointer;
      position: relative;
    }

    .nav-item:hover, .nav-item.active {
      opacity: 1;
      transform: scale(1.05);
    }

    /* Badge السلة */
    .cart-badge {
      position: absolute;
      top: -6px;
      right: -6px;
      background: #d4af37;
      color: #000;
      font-size: 12px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 50%;
      min-width: 20px;
      text-align: center;
      display: none;
    }
  </style>
</head>

<body>

  <h2 id="menuTitle">القائمة</h2>
  <div id="menuList">جاري تحميل القائمة...</div>

  <!-- الشريط السفلي -->
  <div class="bottom-nav">
    <div class="nav-item" onclick="changeCategory('hot')">☕ <span>ساخنة</span></div>
    <div class="nav-item" onclick="changeCategory('cold')">🥤 <span>باردة</span></div>
    <div class="nav-item" onclick="changeCategory('sweets')">🍰 <span>الحلويات</span></div>

    <div class="nav-item" onclick="goToCart()">
      🛒
      <span>السلة</span>
      <div id="cartBadge" class="cart-badge">0</div>
    </div>
  </div>

  <script>
    const db = supabase.createClient(
      "https://motikwjgfgmegekygswy.supabase.co",
      "sb_publishable_yjL5niVoL8Rtr2gF4i2J1w_T1TCjpEI"
    );

    const params = new URLSearchParams(window.location.search);
    let currentCategory = params.get("category") || "hot";

    function updateTitle(cat) {
      document.getElementById("menuTitle").textContent =
        cat === "hot" ? "☕ المشروبات الساخنة"
        : cat === "cold" ? "🥤 المشروبات الباردة"
        : "🍰 الحلويات";
    }

    async function loadMenu(cat) {
      updateTitle(cat);

      const { data, error } = await db
        .from("items")
        .select("*")
        .eq("category", cat);

      const box = document.getElementById("menuList");
      box.innerHTML = "";

      if (error) {
        box.innerHTML = "فشل تحميل القائمة.";
        return;
      }

      if (!data || data.length === 0) {
        box.innerHTML = "<p style='opacity:0.6;'>لا توجد منتجات.</p>";
        return;
      }

      data.forEach(item => {
        box.innerHTML += `
          <div class="item-row" onclick="addItem(${item.id}, ${item.price}, this)">
            <img src="${item.image_url}" class="item-img">
            <div class="item-info">
              <div class="item-name">${item.name_ar}</div>
              <div class="item-desc">${item.description || ""}</div>
              <div class="item-price">${item.price} ريال</div>
            </div>
          </div>
        `;
      });
    }

    function changeCategory(cat) {
      currentCategory = cat;

      const url = new URL(window.location.href);
      url.searchParams.set("category", cat);
      window.history.pushState({}, "", url);

      loadMenu(cat);
    }

    function goToCart() {
      window.location.href = "../cart/index.html";
    }

    async function updateCartBadge() {
      const orderCode = localStorage.getItem("currentOrderCode");
      const badge = document.getElementById("cartBadge");

      if (!orderCode) {
        badge.style.display = "none";
        return;
      }

      const { data: order } = await db
        .from("orders")
        .select("id")
        .eq("order_code", orderCode)
        .maybeSingle();

      if (!order) {
        badge.style.display = "none";
        return;
      }

      const { data: items } = await db
        .from("order_items")
        .select("id")
        .eq("order_id", order.id);

      if (!items || items.length === 0) {
        badge.style.display = "none";
        return;
      }

      badge.textContent = items.length;
      badge.style.display = "block";
    }

    async function addItem(id, price, element) {
      if (element.dataset.added === "true") return;

      let orderCode = localStorage.getItem("currentOrderCode");

      if (!orderCode) {
        orderCode = "RR-" + Math.floor(1000 + Math.random() * 9000);
        localStorage.setItem("currentOrderCode", orderCode);

        await db.from("orders").insert({
          order_code: orderCode,
          status: "pending",
          total: 0
        });
      }

      const { data: order } = await db
        .from("orders")
        .select("id")
        .eq("order_code", orderCode)
        .maybeSingle();

      await db.from("order_items").insert({
        order_id: order.id,
        item_id: id,
        quantity: 1,
        price: price
      });

      element.dataset.added = "true";
      element.innerHTML += `<div class="added-badge">✓ تمت الإضافة</div>`;

      updateCartBadge();
    }

  loadMenu(currentCategory);
updateCartBadge();

  </script>

</body>
</html>
