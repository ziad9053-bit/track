<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>المنيو - Ritzy Roast</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="itemsContainer">جاري تحميل القائمة...</div>

    <script>
        // 1. التعريف الصحيح والمحمي (استخدام sb بدلاً من supabase لتجنب التعارض)
        const sb = window.supabase.createClient(
            "https://motikwjgfgmegekygswy.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1vdGlrd2pnZmdtZWdla3lnc3d5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNzc4MjQsImV4cCI6MjA5NDk1MzgyNH0.GWGDZ-WvjUeTLmgIfQxt6zDhZwN1C9GCHUh75ggSVdo"
        );

        const urlParams = new URLSearchParams(window.location.search);
        const currentCategory = urlParams.get("category") || "hot";

        // 2. دالة جلب الأصناف
        async function fetchMenu() {
            const container = document.getElementById("itemsContainer");
            const { data: items, error } = await sb.from("items").select("*").eq("category", currentCategory);
            
            if (error || !items) {
                container.innerHTML = "خطأ في تحميل الأصناف.";
                return;
            }

            container.innerHTML = "";
            items.forEach(item => {
                container.innerHTML += `<div>${item.name_ar} - ${item.price} ريال 
                    <button onclick="addItem('${item.id}', ${item.price})">إضافة</button></div>`;
            });
        }

        // 3. دالة إضافة صنف
        window.addItem = async function(id, price) {
            let orderCode = localStorage.getItem("currentOrderCode");
            let orderId;

            if (!orderCode) {
                orderCode = "RR-" + Math.floor(1000 + Math.random() * 9000);
                localStorage.setItem("currentOrderCode", orderCode);
                const { data, error } = await sb.from("orders").insert({ order_code: orderCode, status: "pending" }).select("id").single();
                if (error) return alert("خطأ في إنشاء الطلب");
                orderId = data.id;
            } else {
                const { data, error } = await sb.from("orders").select("id").eq("order_code", orderCode).maybeSingle();
                if (error || !data) {
                    localStorage.removeItem("currentOrderCode");
                    return alert("خطأ في الجلسة، يرجى إعادة التحميل.");
                }
                orderId = data.id;
            }

            await sb.from("order_items").insert({ order_id: orderId, item_id: id, quantity: 1, price: price });
            alert("✅ تمت الإضافة للسلة!");
        };

        // تشغيل الدالة عند تحميل الصفحة
        fetchMenu();
    </script>
</body>
</html>
