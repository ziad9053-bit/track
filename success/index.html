<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تتبع الطلب - Ritzy Roast</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: "Tajawal", sans-serif;
      background: #000;
      color: #fff;
      margin: 0;
      padding: 0;
      direction: rtl;
      display: flex;
      justify-content: center;
      padding-bottom: 110px;
    }

    .app-container {
      width: 100%;
      max-width: 480px;
      padding: 40px 20px;
      box-sizing: border-box;
      text-align: center;
    }

    .success-pulse {
      width: 100px;
      height: 100px;
      background: rgba(92, 184, 92, 0.1);
      border: 3px solid #5cb85c;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 45px;
      color: #5cb85c;
      margin: 0 auto 25px auto;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    h2 {
      color: #d4af37;
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .order-code-display {
      font-size: 16px;
      color: #aaa;
      margin-bottom: 30px;
    }

    .status-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 16px;
      padding: 25px 20px;
      margin-bottom: 25px;
    }

    .status-title {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 10px;
    }

    .status-desc {
      font-size: 15px;
      color: #ccc;
      line-height: 1.6;
    }

    .status-steps {
      display: flex;
      justify-content: space-between;
      position: relative;
      margin: 35px 10px 10px 10px;
    }

    .status-steps::before {
      content: "";
      position: absolute;
      top: 15px;
      left: 0;
      right: 0;
      height: 3px;
      background: #222;
    }

    .step-line-progress {
      position: absolute;
      top: 15px;
      right: 0;
      height: 3px;
      background: #d4af37;
      width: 0%;
      transition: width 0.5s ease;
    }

    .step {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #111;
      border: 2px solid #333;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #777;
      transition: 0.4s ease;
      font-weight: 700;
    }

    .step.active {
      border-color: #d4af37;
      color: #d4af37;
    }

    .step.completed {
      background: #5cb85c;
      border-color: #5cb85c;
      color: #000;
    }

    .step-label {
      font-size: 12px;
      color: #888;
      margin-top: 8px;
      font-weight: 600;
    }

    .step-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: #111;
      border-top: 1px solid #333;
      display: flex;
      justify-content: space-around;
      padding: 12px 0;
      z-index: 999;
    }

    .nav-item {
      color: #d4af37;
      font-size: 14px;
      text-decoration: none;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      align-items: center;
      opacity: 0.7;
    }

    .nav-item.active {
      opacity: 1;
      border-bottom: 2px solid #d4af37;
    }
  </style>
</head>

<body>

  <div class="app-container">
    <div class="success-pulse">✔</div>
    <h2>تم استلام طلبك الفخم</h2>
    <div class="order-code-display" id="orderCodeText">جاري تحميل شفرة الطلب...</div>

    <div class="status-card">
      <div class="status-title" id="statusTitle">جاري الاتصال...</div>
      <div class="status-desc" id="statusDesc">نقوم الآن بمزامنة حالة طلبك مباشرة.</div>
    </div>

    <div class="status-steps">
      <div class="step-line-progress" id="lineProgress"></div>

      <div class="step-container">
        <div class="step" id="step-pending">1</div>
        <div class="step-label">بالانتظار</div>
      </div>

      <div class="step-container">
        <div class="step" id="step-progress">2</div>
        <div class="step-label">بالتحضير</div>
      </div>

      <div class="step-container">
        <div class="step" id="step-ready">3</div>
        <div class="step-label">جاهز</div>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <a href="../index.html" class="nav-link nav-item"><span>🏠</span><span>الرئيسية</span></a>
    <a href="../menu/?category=hot" class="nav-link nav-item"><span>☕</span><span>ساخنة</span></a>
    <a href="../menu/?category=cold" class="nav-link nav-item"><span>🥤</span><span>باردة</span></a>
    <a href="../menu/?category=sweets" class="nav-link nav-item"><span>🍰</span><span>الحلويات</span></a>
    <a href="#" class="nav-link nav-item active"><span>📍</span><span>تتبع الطلب</span></a>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const db = createClient(
      "https://motikwjgfgmegekygswy.supabase.co",
      "sb_publishable_yjL5niVoL8Rtr2gF4i2J1w_T1TCjpEI"
    );

    const params = new URLSearchParams(window.location.search);
    const orderCode = params.get("code");

    const title = document.getElementById("statusTitle");
    const desc = document.getElementById("statusDesc");

    if (!orderCode) {
      document.getElementById("orderCodeText").textContent = "خطأ: لا يوجد رقم طلب.";
      title.textContent = "لا يمكن التتبع";
      desc.textContent = "يجب أن يحتوي الرابط على رقم طلب صالح.";
      return;
    }

    document.getElementById("orderCodeText").textContent = `رقم الطلب المرجعي: #${orderCode}`;

    function updateVisualStatus(status, tableNumber) {
      const sPending = document.getElementById("step-pending");
      const sProgress = document.getElementById("step-progress");
      const sReady = document.getElementById("step-ready");
      const line = document.getElementById("lineProgress");

      [sPending, sProgress, sReady].forEach(s => s.className = "step");

      if (status === "pending") {
        title.textContent = "⏳ في انتظار القبول";
        desc.textContent = `تم إرسال طلبك إلى البارستا لطاولة (${tableNumber || "---"}).`;
        sPending.classList.add("active");
        line.style.width = "0%";
      }

      else if (status === "in_progress") {
        title.textContent = "☕ جاري تحضير طلبك";
        desc.textContent = "المبارستا يعمل على تجهيز كوبك الفاخر.";
        sPending.classList.add("completed");
        sProgress.classList.add("active");
        line.style.width = "50%";
      }

      else if (status === "ready") {
        title.textContent = "✨ طلبك جاهز!";
        desc.textContent = `جاهز للاستلام أو سيتم توصيله لطاولة (${tableNumber || "---"}).`;
        sPending.classList.add("completed");
        sProgress.classList.add("completed");
        sReady.classList.add("completed");
        line.style.width = "100%";
      }
    }

    async function trackOrder() {
      try {
        const { data: order, error } = await db
          .from("orders")
          .select("status, table_number")
          .eq("order_code", orderCode)
          .maybeSingle();

        if (error) throw error;

        if (!order) {
          title.textContent = "الطلب غير موجود";
          desc.textContent = "تحقق من صحة الرابط.";
          clearInterval(window.__trackInterval);
          return;
        }

        updateVisualStatus(order.status, order.table_number);

      } catch (err) {
        title.textContent = "انقطاع الاتصال";
        desc.textContent = "يرجى التحقق من الإنترنت.";
        clearInterval(window.__trackInterval);
      }
    }

    trackOrder();
    window.__trackInterval = setInterval(trackOrder, 5000);

    document.querySelectorAll(".nav-link").forEach(link => {
      if (orderCode && link.href && link.href !== "#") {
        const url = new URL(link.href, window.location.href);
        url.searchParams.set("code", orderCode);
        link.href = url.toString();
      }
    });
  </script>

</body>
</html>
