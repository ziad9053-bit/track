<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تتبع الطلب - Ritzy Roast</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: "Tajawal", sans-serif;
      background: #000;
      color: #fff;
      margin: 0;
      padding: 0;
      direction: rtl;
      display: flex;
      justify-content: center;
      padding-bottom: 110px; /* مساحة للشريط السفلي */
    }

    .app-container {
      width: 100%;
      max-width: 480px;
      padding: 40px 20px;
      box-sizing: border-box;
      text-align: center;
    }

    /* أنيميشن فخم لعلامة النجاح */
    .success-pulse {
      width: 100px;
      height: 100px;
      background: rgba(92, 184, 92, 0.1);
      border: 3px solid #5cb85c;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 45px;
      color: #5cb85c;
      margin: 0 auto 25px auto;
      text-shadow: 0 0 15px rgba(92, 184, 92, 0.6);
      box-shadow: 0 0 20px rgba(92, 184, 92, 0.2);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); box-shadow: 0 0 20px rgba(92, 184, 92, 0.2); }
      50% { transform: scale(1.05); box-shadow: 0 0 30px rgba(92, 184, 92, 0.4); }
      100% { transform: scale(1); box-shadow: 0 0 20px rgba(92, 184, 92, 0.2); }
    }

    h2 {
      color: #d4af37;
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .order-code-display {
      font-size: 16px;
      color: #aaa;
      margin-bottom: 30px;
      letter-spacing: 1px;
    }

    /* كرت الحالة الديناميكي المتغير */
    .status-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 16px;
      padding: 25px 20px;
      margin-bottom: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .status-title {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 10px;
    }

    .status-desc {
      font-size: 15px;
      color: #ccc;
      line-height: 1.6;
    }

    /* مؤشر الحالات البصري المتقدم */
    .status-steps {
      display: flex;
      justify-content: space-between;
      position: relative;
      margin: 35px 10px 10px 10px;
    }

    .status-steps::before {
      content: "";
      position: absolute;
      top: 15px;
      left: 0;
      right: 0;
      height: 3px;
      background: #222;
      z-index: 1;
    }

    .step-line-progress {
      position: absolute;
      top: 15px;
      right: 0;
      height: 3px;
      background: #d4af37;
      z-index: 2;
      width: 0%;
      transition: width 0.5s ease;
    }

    .step {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #111;
      border: 2px solid #333;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      z-index: 3;
      color: #777;
      transition: 0.4s ease;
      font-weight: 700;
    }

    .step.active {
      border-color: #d4af37;
      background: #000;
      color: #d4af37;
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
    }

    .step.completed {
      border-color: #5cb85c;
      background: #5cb85c;
      color: #000;
    }

    .step-label {
      font-size: 12px;
      color: #888;
      margin-top: 8px;
      font-weight: 600;
    }

    .step-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
    }

    /* شريط التنقل السفلي الموحد */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: #111;
      border-top: 1px solid #333;
      display: flex;
      justify-content: space-around;
      padding: 12px 0;
      z-index: 999;
      box-sizing: border-box;
    }

    .nav-item {
      color: #d4af37;
      font-size: 14px;
      text-decoration: none;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      opacity: 0.7;
    }
    
    .nav-item.active {
      opacity: 1;
      border-bottom: 2px solid #d4af37;
    }
  </style>
</head>

<body>

  <div class="app-container">
    <div class="success-pulse">✔</div>
    <h2>تم استلام طلبك الفخم</h2>
    <div class="order-code-display" id="orderCodeText">جاري تحميل شفرة الطلب...</div>

    <div class="status-card">
      <div class="status-title" id="statusTitle">جاري الاتصال...</div>
      <div class="status-desc" id="statusDesc">نحن نصل بقاعدة البيانات لتحديث حالة كوبك الفاخر مباشرة.</div>
    </div>

    <div class="status-steps">
      <div class="step-line-progress" id="lineProgress"></div>
      
      <div class="step-container">
        <div class="step" id="step-pending">1</div>
        <div class="step-label">بالانتظار</div>
      </div>
      <div class="step-container">
        <div class="step" id="step-progress">2</div>
        <div class="step-label">بالتحضير</div>
      </div>
      <div class="step-container">
        <div class="step" id="step-ready">3</div>
        <div class="step-label">جاهز</div>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <a href="../index.html" class="nav-link nav-item"><span>🏠</span><span>الرئيسية</span></a>
    <a href="../menu/?category=hot" class="nav-link nav-item"><span>☕</span><span>ساخنة</span></a>
    <a href="../menu/?category=cold" class="nav-link nav-item"><span>🥤</span><span>باردة</span></a>
    <a href="../menu/?category=sweets" class="nav-link nav-item"><span>🍰</span><span>الحلويات</span></a>
    <a href="#" class="nav-link nav-item active"><span>📍</span><span>تتبع الطلب</span></a>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabase = createClient(
      "https://motikwjgfgmegekygswy.supabase.co",
      "sb_publishable_yjL5niVoL8Rtr2gF4i2J1w_T1TCjpEI"
    );

    const params = new URLSearchParams(window.location.search);
    const orderCode = params.get("code");

    if (orderCode) {
      document.getElementById("orderCodeText").textContent = `رقم الطلب المرجعي: #${orderCode}`;
    } else {
      document.getElementById("orderCodeText").textContent = `خطأ: كود الجلسة غير متوفر`;
    }

    // دالة المراقبة والاستعلام الحي عن حالة الطلب من خادم الموظفين لقاعدة البيانات
    async function trackOrderLive() {
      if (!orderCode) return;

      try {
        const { data: order, error } = await supabase
          .from("orders")
          .select("status, table_number")
          .eq("order_code", orderCode)
          .maybeSingle();

        if (error) throw error;
        if (!order) {
          document.getElementById("statusTitle").textContent = "طلب غير موجود";
          document.getElementById("statusDesc").textContent = "لم نتمكن من العثور على هذا الطلب في سجلات Ritzy Roast.";
          return;
        }

        updateVisualStatus(order.status, order.table_number);
      } catch (err) {
        console.error("خطأ أثناء تتبع حالة الطلب حياً:", err.message);
      }
    }

    // هندسة تعديل الواجهة والمؤشرات الرسومية بناءً على رد البارستا الحالي في الـ Database
    function updateVisualStatus(status, tableNumber) {
      const title = document.getElementById("statusTitle");
      const desc = document.getElementById("statusDesc");
      const line = document.getElementById("lineProgress");
      
      const sPending = document.getElementById("step-pending");
      const sProgress = document.getElementById("step-progress");
      const sReady = document.getElementById("step-ready");

      // إعادة تهيئة الفئات لإعادة التلوين الصحيح
      [sPending, sProgress, sReady].forEach(s => s.className = "step");

      if (status === "pending" || !status) {
        title.textContent = "⏳ في انتظار القبول";
        desc.textContent = `تم إرسال طلبك بنجاح إلى البارستا لطاولة رقم (${tableNumber || '---'}). سيتم البدء في تجهيزه فوراً.`;
        sPending.classList.add("active");
        line.style.width = "0%";
      } 
      else if (status === "in_progress") {
        title.textContent = "☕ جاري تحضير طلبك";
        desc.textContent = "المبارستا يقوم الآن بتركيب ومزج خلطتك الفاخرة بكل حب وعناية؛ ترقب كوبك الفخم!";
        sPending.classList.add("completed");
        sProgress.classList.add("active");
        line.style.width = "50%";
      } 
      else if (status === "ready") {
        title.textContent = "✨ طلبك الفاخر جاهز!";
        desc.textContent = `كوبك الرائع بانتظارك الآن! تفضل باستلامه أو سيقوم موظف التوصيل بنقله إلى طاولة ${tableNumber || '---'} فوراً.`;
        sPending.classList.add("completed");
        sProgress.classList.add("completed");
        sReady.classList.add("completed");
        line.style.width = "100%";
      }
      else if (status === "done") {
        title.textContent = "📦 تم الاستلام بنجاح";
        desc.textContent = "بالهناء والشفاء! يسعدنا جداً خدمتك اليوم في Ritzy Roast، نتمنى لك وقتاً فخماً وساحراً!";
        sPending.classList.add("completed");
        sProgress.classList.add("completed");
        sReady.classList.add("completed");
        line.style.width = "100%";
      }
    }

    // تشغيل التتبع لأول مرة فوراً
    trackOrderLive();

    // تشغيل الـ Polling التلقائي الآمن كل 5 ثوانٍ لمراقبة شاشة تبديل الحالات حياً
    setInterval(trackOrderLive, 5000);

    // الحفاظ التام على تمرير شفرة الجلسة code لجميع الروابط للتنقل بلا فقدان للبيانات
    if (orderCode) {
      document.querySelectorAll(".nav-link").forEach(link => {
        if (link.getAttribute("href") && link.getAttribute("href") !== "#") {
          const url = new URL(link.href, window.location.href);
          url.searchParams.set("code", orderCode);
          link.href = url.toString();
        }
      });
    }
  </script>

</body>
</html>
