<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <title>تم إرسال الطلب</title>

  <style>
    body {
      font-family: "Tajawal", sans-serif;
      background: #000;
      color: #fff;
      margin: 0;
      padding: 20px;
      direction: rtl;
      text-align: center;
    }

    /* شاشة الانتظار */
    #loadingScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 9999;
    }

    .spinner {
      border: 4px solid rgba(255,255,255,0.1);
      border-top: 4px solid #d4af37;
      border-radius: 50%;
      width: 45px;
      height: 45px;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    h2 {
      color: #d4af37;
      margin-bottom: 10px;
    }

    .status {
      font-size: 22px;
      margin-top: 20px;
    }

    .qr-box {
      margin-top: 25px;
    }

    .qr-box img {
      width: 220px;
      height: 220px;
      transition: 0.3s;
    }

    .ready {
      color: #5cb85c;
      font-size: 26px;
      margin-top: 20px;
      font-weight: bold;
    }

    .pending {
      color: #f0ad4e;
      font-size: 22px;
      margin-top: 20px;
    }

    .timer {
      margin-top: 15px;
      font-size: 20px;
      color: #d4af37;
    }
  </style>
</head>

<body>

  <!-- شاشة الانتظار -->
  <div id="loadingScreen">
    <div class="spinner"></div>
    <div style="color:#d4af37;font-size:18px;">جاري تحميل طلبك…</div>
  </div>

  <h2>تم إرسال طلبك بنجاح</h2>

  <div id="orderIdBox"></div>

  <div class="qr-box" id="qrBox"></div>

  <div id="statusBox" class="status"></div>

  <div id="timerBox" class="timer"></div>

  <!-- صوت الجاهزية -->
  <audio id="readySound">
    <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
  </audio>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabase = createClient(
      "https://motikwjgfgmegekygswy.supabase.co",
      "ضع_المفتاح_هنا"
    );

    const orderId = localStorage.getItem("last_order_id");

    if (!orderId) {
      document.body.innerHTML = "<h2>لا يوجد طلب</h2>";
      throw new Error("No order ID found");
    }

    // إخفاء شاشة الانتظار بعد 1.2 ثانية
    setTimeout(() => {
      document.getElementById("loadingScreen").style.display = "none";
    }, 1200);

    document.getElementById("orderIdBox").innerHTML =
      `<div>رقم الطلب: <strong>${orderId}</strong></div>`;

    // QR الأساسي (ذهبي)
    const qrBox = document.getElementById("qrBox");
    const qrUrlGold = `https://api.qrserver.com/v1/create-qr-code/?size=220x220&color=212-175-55&data=${orderId}`;
    const qrUrlGreen = `https://api.qrserver.com/v1/create-qr-code/?size=220x220&color=0-255-0&data=${orderId}`;

    qrBox.innerHTML = `<img id="qrImage" src="${qrUrlGold}" alt="QR">`;

    let prepStartTime = null;
    let timerInterval = null;
    let lastStatus = "pending";

    function startTimer() {
      if (!prepStartTime) return;

      timerInterval = setInterval(() => {
        const now = new Date();
        const diff = Math.floor((now - new Date(prepStartTime)) / 1000);

        const min = Math.floor(diff / 60);
        const sec = diff % 60;

        document.getElementById("timerBox").textContent =
          `الوقت منذ بدء التحضير: ${min}:${sec.toString().padStart(2, "0")}`;
      }, 1000);
    }

    async function checkStatus() {
      const { data, error } = await supabase
        .from("orders")
        .select("status, created_at")
        .eq("id", orderId)
        .single();

      if (error) return;

      // حفظ وقت البدء
      if (!prepStartTime) {
        prepStartTime = data.created_at;
        startTimer();
      }

      // تحديث الحالة
      if (data.status === "pending") {
        document.getElementById("statusBox").innerHTML =
          `<div class="pending">طلبك قيد التحضير…</div>`;
      }

      if (data.status === "ready") {
        document.getElementById("statusBox").innerHTML =
          `<div class="ready">✔ طلبك جاهز للاستلام</div>`;

        // تغيير لون QR إلى أخضر
        document.getElementById("qrImage").src = qrUrlGreen;

        // تشغيل صوت الجاهزية مرة واحدة فقط
        if (lastStatus !== "ready") {
          const audio = document.getElementById("readySound");
          audio.currentTime = 0;
          audio.play().catch(() => {});

          // اهتزاز الهاتف
          if (navigator.vibrate) {
            navigator.vibrate([200, 100, 200]);
          }
        }

        lastStatus = "ready";
      }
    }

    checkStatus();
    setInterval(checkStatus, 3000);
  </script>

</body>
</html>
