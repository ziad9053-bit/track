<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <title>تم إرسال الطلب</title>

  <style>
    body {
      font-family: "Tajawal", sans-serif;
      background: #000;
      color: #fff;
      margin: 0;
      padding: 20px;
      direction: rtl;
      text-align: center;
    }

    h2 {
      color: #d4af37;
      margin-bottom: 10px;
    }

    .status {
      font-size: 22px;
      margin-top: 20px;
    }

    .qr-box {
      margin-top: 25px;
    }

    .qr-box img {
      width: 220px;
      height: 220px;
    }

    .ready {
      color: #5cb85c;
      font-size: 26px;
      margin-top: 20px;
      font-weight: bold;
    }

    .pending {
      color: #f0ad4e;
      font-size: 22px;
      margin-top: 20px;
    }

    .timer {
      margin-top: 15px;
      font-size: 20px;
      color: #d4af37;
    }
  </style>
</head>

<body>

  <h2>تم إرسال طلبك بنجاح</h2>

  <div id="orderIdBox"></div>

  <div class="qr-box" id="qrBox"></div>

  <div id="statusBox" class="status"></div>

  <div id="timerBox" class="timer"></div>

  <!-- صوت الجاهزية -->
  <audio id="readySound">
    <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
  </audio>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabase = createClient(
      "https://motikwjgfgmegekygswy.supabase.co",
      "ضع_المفتاح_هنا"
    );

    const orderId = localStorage.getItem("last_order_id");

    if (!orderId) {
      document.body.innerHTML = "<h2>لا يوجد طلب</h2>";
      throw new Error("No order ID found");
    }

    document.getElementById("orderIdBox").innerHTML =
      `<div>رقم الطلب: <strong>${orderId}</strong></div>`;

    // QR
    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${orderId}`;
    document.getElementById("qrBox").innerHTML =
      `<img src="${qrUrl}" alt="QR">`;

    let prepStartTime = null;
    let timerInterval = null;
    let lastStatus = "pending";

    function startTimer() {
      if (!prepStartTime) return;

      timerInterval = setInterval(() => {
        const now = new Date();
        const diff = Math.floor((now - new Date(prepStartTime)) / 1000);

        const min = Math.floor(diff / 60);
        const sec = diff % 60;

        document.getElementById("timerBox").textContent =
          `الوقت منذ بدء التحضير: ${min}:${sec.toString().padStart(2, "0")}`;
      }, 1000);
    }

    async function checkStatus() {
      const { data, error } = await supabase
        .from("orders")
        .select("status, created_at")
        .eq("id", orderId)
        .single();

      if (error) return;

      // حفظ وقت البدء
      if (!prepStartTime) {
        prepStartTime = data.created_at;
        startTimer();
      }

      // تحديث الحالة
      if (data.status === "pending") {
        document.getElementById("statusBox").innerHTML =
          `<div class="pending">طلبك قيد التحضير…</div>`;
      }

      if (data.status === "ready") {
        document.getElementById("statusBox").innerHTML =
          `<div class="ready">✔ طلبك جاهز للاستلام</div>`;

        // تشغيل صوت الجاهزية مرة واحدة فقط
        if (lastStatus !== "ready") {
          const audio = document.getElementById("readySound");
          audio.currentTime = 0;
          audio.play().catch(() => {});
        }

        lastStatus = "ready";
      }
    }

    checkStatus();
    setInterval(checkStatus, 3000);
  </script>

</body>
</html>
