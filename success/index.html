<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <title>تم إرسال الطلب</title>

  <style>
    body {
      font-family: "Tajawal", sans-serif;
      background: #000;
      color: #fff;
      margin: 0;
      padding: 20px;
      direction: rtl;
      text-align: center;
      padding-bottom: 90px; /* مساحة للشريط السفلي */
    }

    h2 {
      color: #d4af37;
      font-size: 28px;
      margin-top: 40px;
    }

    p {
      font-size: 20px;
      margin-top: 10px;
      opacity: 0.8;
    }

    .checkmark {
      font-size: 80px;
      color: #5cb85c;
      margin-top: 30px;
      text-shadow: 0 0 20px rgba(0,255,0,0.4);
    }

    /* الشريط السفلي */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #111;
      border-top: 1px solid #333;
      display: flex;
      justify-content: space-around;
      padding: 12px 0;
      z-index: 999;
    }

    .nav-item {
      color: #d4af37;
      font-size: 16px;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>

<body>

  <div class="checkmark">✔</div>
  <h2>تم إرسال طلبك بنجاح</h2>
  <p>سيتم البدء في تحضيره الآن</p>

  <!-- الشريط السفلي -->
  <div class="bottom-nav">
    <a href="../menu/?category=hot&code=<?=code?>" class="nav-item">☕ ساخن</a>
    <a href="../menu/?category=cold&code=<?=code?>" class="nav-item">🥤 بارد</a>
    <a href="../menu/?category=sweets&code=<?=code?>" class="nav-item">🍰 حلى</a>
    <a href="../cart/?code=<?=code?>" class="nav-item">🛒 السلة</a>
    <a href="../customer/track.html?code=<?=code?>" class="nav-item">📍 تتبع</a>
  </div>

  <script>
    const codeValue = new URLSearchParams(window.location.search).get("code");

    document.querySelectorAll(".nav-item").forEach(link => {
      link.href = link.href.replace("<?=code?>", codeValue);
    });
  </script>

</body>
</html>
