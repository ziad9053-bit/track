<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>السلة</title>

  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: "Tajawal", sans-serif;
      background: #000;
      color: #fff;
      padding: 20px;
    }

    h2 {
      text-align: center;
      color: #d4af37;
      margin-bottom: 25px;
      font-size: 28px;
      text-shadow: 0 0 8px rgba(212,175,55,0.6);
    }

    .item-box {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(212,175,55,0.3);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
      box-shadow: 0 0 10px rgba(212,175,55,0.15);
      text-align: right;
    }

    .item-name {
      font-size: 22px;
      color: #fff;
      font-weight: bold;
    }

    .item-price {
      font-size: 18px;
      color: #d4af37;
      margin-bottom: 10px;
    }

    .qty-row {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      margin-top: 5px;
    }

    .qty-btn {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      border: 2px solid #d4af37;
      background: #000;
      color: #d4af37;
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .qty-btn:hover {
      background: #d4af37;
      color: #000;
    }

    .qty-number {
      font-size: 20px;
      font-weight: bold;
      color: #fff;
      width: 30px;
      text-align: center;
    }

    .total-box {
      margin-top: 25px;
      font-size: 24px;
      text-align: center;
      color: #d4af37;
      font-weight: bold;
    }

    .confirm-btn {
      background: linear-gradient(90deg, #d4af37, #b8962e);
      color: #000;
      padding: 15px;
      border-radius: 12px;
      font-size: 22px;
      font-weight: bold;
      width: 100%;
      border: none;
      margin-top: 30px;
      cursor: pointer;
      box-shadow: 0 0 12px rgba(212,175,55,0.6);
      transition: 0.2s ease;
    }

    .confirm-btn:hover {
      transform: scale(1.03);
      box-shadow: 0 0 18px rgba(212,175,55,0.9);
    }
  </style>
</head>

<body>

  <h2>السلة</h2>

  <div id="cart">جاري تحميل السلة...</div>

  <div class="total-box" id="totalBox"></div>

  <button class="confirm-btn" onclick="confirmOrder()">إتمام الطلب</button>

<script>
  const db = supabase.createClient(
    "https://motikwjgfgmegekygswy.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1vdGlrd2pnZmdtZWdla3lnc3d5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNzc4MjQsImV4cCI6MjA5NDk1MzgyNH0.GWGDZ-WvjUeTLmgIfQxt6zDhZwN1C9GCHUh75ggSVdo"
  );

  async function loadCart() {
    const orderCode = localStorage.getItem("currentOrderCode");
    const cartBox = document.getElementById("cart");

    if (!orderCode) {
      cartBox.innerHTML = "لا يوجد طلب نشط.";
      return;
    }

    const { data: order } = await db
      .from("orders")
      .select("id")
      .eq("order_code", orderCode)
      .maybeSingle();

    if (!order) {
      cartBox.innerHTML = "تعذر العثور على الطلب.";
      return;
    }

    const { data: items } = await db
      .from("order_items")
      .select("*")
      .eq("order_id", order.id);

    if (!items || items.length === 0) {
      cartBox.innerHTML = "السلة فارغة.";
      document.getElementById("totalBox").textContent = "";
      return;
    }

    const { data: menuItems } = await db
      .from("items")
      .select("id, name_ar, price");

    const map = {};
    menuItems.forEach(i => (map[i.id] = i));

    cartBox.innerHTML = "";
    let total = 0;

    items.forEach(it => {
      const p = map[it.item_id];
      total += it.quantity * it.price;

      cartBox.innerHTML += `
        <div class="item-box">
          <div class="item-name">${p.name_ar}</div>
          <div class="item-price">${it.price} ريال</div>

          <div class="qty-row">
            <button class="qty-btn" onclick="updateQty('${it.id}', ${it.quantity - 1})">-</button>
            <div class="qty-number">${it.quantity}</div>
            <button class="qty-btn" onclick="updateQty('${it.id}', ${it.quantity + 1})">+</button>
          </div>
        </div>
      `;
    });

    document.getElementById("totalBox").textContent = `الإجمالي: ${total} ريال`;

    await db.from("orders").update({ total }).eq("id", order.id);
  }

  async function updateQty(itemId, newQty) {
    if (newQty <= 0) {
      await db.from("order_items").delete().eq("id", itemId);
    } else {
      await db.from("order_items").update({ quantity: newQty }).eq("id", itemId);
    }
    loadCart();
  }

  async function confirmOrder() {
    const orderCode = localStorage.getItem("currentOrderCode");
    window.location.href = `../customer/track.html?code=${orderCode}`;
  }

  loadCart();
</script>

</body>
</html>
