<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إتمام الطلب</title>

  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: "Tajawal", sans-serif;
      background: linear-gradient(180deg, #000 0%, #0a0a0a 100%);
      color: #fff;
      margin: 0;
      padding: 20px;
      animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h2 {
      text-align: center;
      color: #d4af37;
      margin-bottom: 25px;
      font-size: 28px;
      letter-spacing: 1px;
      text-shadow: 0 0 8px rgba(212,175,55,0.6);
    }

    .item {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 12px;
      border: 1px solid rgba(212,175,55,0.25);
      box-shadow: 0 0 10px rgba(212,175,55,0.15);
      animation: fadeIn 0.6s ease;
    }

    .total-box {
      margin-top: 25px;
      font-size: 24px;
      text-align: center;
      color: #d4af37;
      font-weight: bold;
      text-shadow: 0 0 6px rgba(212,175,55,0.6);
    }

    .confirm-btn {
      background: linear-gradient(90deg, #d4af37, #b8962e);
      color: #000;
      padding: 15px;
      border-radius: 12px;
      font-size: 22px;
      font-weight: bold;
      width: 100%;
      border: none;
      margin-top: 30px;
      cursor: pointer;
      box-shadow: 0 0 12px rgba(212,175,55,0.6);
      transition: 0.2s ease;
    }

    .confirm-btn:hover {
      transform: scale(1.03);
      box-shadow: 0 0 18px rgba(212,175,55,0.9);
    }

    .input-box {
      margin-top: 25px;
      text-align: center;
    }

    label {
      font-size: 18px;
      color: #d4af37;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(212,175,55,0.4);
      margin-top: 10px;
      font-size: 18px;
      text-align: center;
      background: #111;
      color: #fff;
      box-shadow: 0 0 8px rgba(212,175,55,0.2);
    }
  </style>
</head>

<body>

  <h2>مراجعة الطلب</h2>

  <div id="cart">جاري تحميل السلة...</div>

  <div class="input-box">
    <label>رقم الطاولة</label>
    <input type="number" id="tableNumber" placeholder="أدخل رقم الطاولة">
  </div>

  <div class="total-box" id="totalBox"></div>

  <button class="confirm-btn" onclick="confirmOrder()">تأكيد الطلب</button>

<script>
  const db = supabase.createClient(
    "https://motikwjgfgmegekygswy.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1vdGlrd2pnZmdtZWdla3lnc3d5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNzc4MjQsImV4cCI6MjA5NDk1MzgyNH0.GWGDZ-WvjUeTLmgIfQxt6zDhZwN1C9GCHUh75ggSVdo"
  );

  async function loadOrder() {
    const orderCode = localStorage.getItem("currentOrderCode");
    const cartBox = document.getElementById("cart");

    if (!orderCode) {
      cartBox.innerHTML = "لا يوجد طلب نشط.";
      return;
    }

    const { data: order, error: orderErr } = await db
      .from("orders")
      .select("id, table_no")
      .eq("order_code", orderCode)
      .maybeSingle();

    if (orderErr || !order) {
      cartBox.innerHTML = "تعذر العثور على الطلب.";
      return;
    }

    const { data: items } = await db
      .from("order_items")
      .select("*")
      .eq("order_id", order.id);

    if (!items || items.length === 0) {
      cartBox.innerHTML = "السلة فارغة.";
      return;
    }

    const { data: menuItems } = await db
      .from("items")
      .select("id, name_ar");

    const nameMap = {};
    menuItems?.forEach(i => nameMap[i.id] = i.name_ar);

    let total = 0;
    cartBox.innerHTML = "";

    items.forEach(it => {
      total += it.quantity * it.price;
      cartBox.innerHTML += `
        <div class="item">
          <div style="font-size:18px; color:#d4af37;">${nameMap[it.item_id] || "منتج"}</div>
          <div style="color:#ccc;">${it.price} ر.س × ${it.quantity}</div>
        </div>
      `;
    });

    document.getElementById("totalBox").textContent = `الإجمالي: ${total} ر.س`;

    await db.from("orders").update({ total }).eq("id", order.id);
  }

  let isSending = false;

  async function confirmOrder() {
    if (isSending) return;
    isSending = true;

    const tableNumber = document.getElementById("tableNumber").value;

    if (!tableNumber || tableNumber <= 0 || tableNumber > 200) {
      isSending = false;
      return alert("يرجى إدخال رقم طاولة صحيح!");
    }

    const orderCode = localStorage.getItem("currentOrderCode");

    await db.from("orders")
      .update({
        table_no: tableNumber,
        status: "pending"
      })
      .eq("order_code", orderCode);

    localStorage.removeItem("currentOrderCode");

    window.location.href = `../customer/track.html?code=${orderCode}`;
  }

  loadOrder();
</script>

</body>
</html>
