<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مراجعة وإتمام الطلب - Ritzy Roast</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: "Tajawal", sans-serif;
      background: #000;
      color: #fff;
      margin: 0;
      padding: 0;
      direction: rtl;
      display: flex;
      justify-content: center;
      padding-bottom: 110px; /* مساحة للشريط السفلي */
    }

    .app-container {
      width: 100%;
      max-width: 480px;
      padding: 20px 16px;
      box-sizing: border-box;
    }

    h2 {
      text-align: center;
      color: #d4af37;
      margin-bottom: 25px;
      font-size: 26px;
      font-weight: 700;
    }

    .review-box {
      max-height: 250px;
      overflow-y: auto;
      margin-bottom: 20px;
      padding-right: 4px;
    }

    .item {
      background: rgba(255,255,255,0.06);
      padding: 14px;
      border-radius: 12px;
      margin-bottom: 12px;
      border: 1px solid rgba(212, 175, 55, 0.15);
      text-align: right;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .name {
      font-size: 17px;
      font-weight: 600;
    }

    .price {
      color: #d4af37;
      font-weight: 700;
      font-size: 15px;
    }

    .total-box {
      margin-top: 15px;
      font-size: 22px;
      text-align: center;
      color: #d4af37;
      font-weight: 700;
      border-bottom: 1px dashed rgba(212,175,55,0.2);
      padding-bottom: 15px;
    }

    .input-box {
      margin-top: 25px;
      text-align: center;
    }

    .input-box label {
      font-size: 16px;
      color: #aaa;
      font-weight: 600;
    }

    input {
      width: 100%;
      max-width: 180px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #c5a059;
      background: #111;
      color: #fff;
      font-size: 20px;
      font-weight: bold;
      text-align: center;
      margin-top: 12px;
      box-sizing: border-box;
      outline: none;
      box-shadow: 0 0 10px rgba(212,175,55,0.1);
    }

    input:focus {
      border-color: #d4af37;
      box-shadow: 0 0 15px rgba(212,175,55,0.3);
    }

    .confirm-btn {
      background: #c5a059;
      color: #000;
      padding: 14px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      width: 100%;
      border: none;
      margin-top: 30px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(197, 160, 89, 0.3);
      transition: 0.25s;
    }

    .confirm-btn:hover {
      background: #d4af37;
      transform: translateY(-2px);
    }

    /* الشريط السفلي الخماسي الموحد */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: #111;
      border-top: 1px solid #333;
      display: flex;
      justify-content: space-around;
      padding: 12px 0;
      z-index: 999;
      box-sizing: border-box;
    }

    .nav-item {
      color: #d4af37;
      font-size: 14px;
      text-decoration: none;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <div class="app-container">
    <h2>مراجعة الطلب</h2>

    <div id="cart" class="review-box"></div>

    <div class="total-box" id="totalBox">جاري حساب المجموع...</div>

    <div class="input-box">
      <label for="tableNumber">رقم الطاولة لتوصيل الطلب</label><br>
      <input type="number" id="tableNumber" inputmode="numeric" placeholder="مثال: 5" min="1" />
    </div>

    <button class="confirm-btn" onclick="confirmOrder()">🔥 إرسال الطلب للمبارستا</button>
  </div>

  <div class="bottom-nav">
    <a href="../index.html" class="nav-link class-item nav-item"><span>🏠</span><span>الرئيسية</span></a>
    <a href="../menu/?category=hot" class="nav-link nav-item"><span>☕</span><span>ساخنة</span></a>
    <a href="../menu/?category=cold" class="nav-link nav-item"><span>🥤</span><span>باردة</span></a>
    <a href="../menu/?category=sweets" class="nav-link nav-item"><span>🍰</span><span>الحلويات</span></a>
    <a href="../cart/" class="nav-link nav-item"><span>🛒</span><span>السلة</span></a>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabase = createClient(
      "https://motikwjgfgmegekygswy.supabase.co",
      "sb_publishable_yjL5niVoL8Rtr2gF4i2J1w_T1TCjpEI"
    );

    const params = new URLSearchParams(window.location.search);
    const orderCode = params.get("code");

    let orderId = null;

    async function loadOrder() {
      if (!orderCode) {
        document.getElementById("cart").innerHTML = "<p style='text-align:center;color:#ff4444'>كود الجلسة مفقود!</p>";
        return;
      }

      try {
        // 1. جلب بيانات الطلب الحالي
        const { data: order, error: orderError } = await supabase
          .from("orders")
          .select("*")
          .eq("order_code", orderCode)
          .maybeSingle();

        if (orderError || !order) throw orderError || new Error("الطلب غير موجود");
        orderId = order.id;

        // تعبئة رقم الطاولة تلقائياً لو كان مخزناً مسبقاً
        if (order.table_number) {
          document.getElementById("tableNumber").value = order.table_number;
        }

        // 2. جلب العناصر المضافة للطلب
        const { data: items, error: itemsError } = await supabase
          .from("order_items")
          .select("*")
          .eq("order_id", orderId);

        if (itemsError) throw itemsError;

        // 3. تصحيح استدعاء جدول المنتجات الحقيقي (items) بدلاً من products
        const { data: menuItems, error: menuError } = await supabase
          .from("items")
          .select("*");

        if (menuError) throw menuError;

        const map = {};
        if (menuItems) {
          menuItems.forEach(p => map[p.id] = p);
        }

        render(items, map);
      } catch (err) {
        console.error("خطأ أثناء جلب تفاصيل المراجعة:", err.message);
      }
    }

    function render(items, map) {
      const container = document.getElementById("cart");
      const totalBox = document.getElementById("totalBox");

      if (!items || items.length === 0) {
        container.innerHTML = "<p style='text-align:center;opacity:0.7;padding:20px;'>سلتك فارغة، تفضل بزيارة المنيو ☕</p>";
        totalBox.textContent = "";
        return;
      }

      let total = 0;
      container.innerHTML = "";

      items.forEach(it => {
        const p = map[it.item_id] || { name_ar: "منتج غير معروف" };
        total += it.quantity * it.price;

        container.innerHTML += `
          <div class="item">
            <div class="name">${p.name_ar}</div>
            <div class="price">${it.price} ريال × ${it.quantity}</div>
          </div>
        `;
      });

      totalBox.textContent = `إجمالي الحساب: ${total} ريال`;
    }

    // جعل الدالة متاحة للزر في الـ Global Scope
    window.confirmOrder = async function() {
      const tableNumber = document.getElementById("tableNumber").value.trim();

      if (!tableNumber || isNaN(tableNumber) || parseInt(tableNumber) <= 0) {
        alert("لطفاً، أدخل رقم طاولة صحيح لتوصيل طلبك الفخم.");
        return;
      }

      // تحديث الجدول لتوثيق الطاولة وتحويل الحالة إلى المعالجة الحية
      const { error } = await supabase
        .from("orders")
        .update({
          table_number: tableNumber,
          status: "pending" // تعود للحالة المبدئية المعترَف بها في صفحة التتبع ولدى البارستا
        })
        .eq("id", orderId);

      if (error) {
        alert("عذراً، فشل تأكيد الطلب. يرجى التحقق من اتصال شبكتك.");
        return;
      }

      // نقله فوراً وبأمان تام إلى صفحة التتبع والـ QR الذهبي
      window.location.href = `../customer/track.html?code=${orderCode}`;
    };

    // تشغيل الدالة فور تحميل الصفحة لتهيئة المراجعة
    loadOrder();

    // تأمين بقاء كود الطلب مع روابط شريط التنقل السفلي أثناء التصفح
    if (orderCode) {
      document.querySelectorAll(".nav-link").forEach(link => {
        if (link.getAttribute("href") && link.getAttribute("href") !== "#") {
          const url = new URL(link.href, window.location.href);
          url.searchParams.set("code", orderCode);
          link.href = url.toString();
        }
      });
    }
  </script>

</body>
</html>
