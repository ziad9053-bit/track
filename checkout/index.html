<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <title>إتمام الطلب</title>

  <style>
    body {
      font-family: "Tajawal", sans-serif;
      background: #000;
      color: #fff;
      margin: 0;
      padding: 20px;
      direction: rtl;
    }

    h2 {
      text-align: center;
      color: #d4af37;
      margin-bottom: 20px;
    }

    .item {
      background: rgba(255,255,255,0.06);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 12px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .name {
      font-size: 18px;
      margin-bottom: 5px;
    }

    .price {
      color: #d4af37;
      margin-bottom: 10px;
    }

    .total-box {
      margin-top: 20px;
      font-size: 22px;
      text-align: center;
      color: #d4af37;
    }

    .confirm-btn {
      background: #d4af37;
      color: #000;
      padding: 15px;
      border-radius: 10px;
      font-size: 20px;
      font-weight: bold;
      width: 100%;
      border: none;
      margin-top: 25px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h2>مراجعة الطلب</h2>

  <div id="cart"></div>

  <div class="total-box" id="totalBox"></div>

  <button class="confirm-btn" onclick="confirmOrder()">تأكيد الطلب</button>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabase = createClient(
      "https://motikwjgfgmegekygswy.supabase.co",
      "ضع_المفتاح_هنا"
    );

    let cart = JSON.parse(localStorage.getItem("cart") || "[]");

    function loadCart() {
      const container = document.getElementById("cart");

      if (cart.length === 0) {
        container.innerHTML = `<div style="text-align:center;margin-top:40px;color:#aaa;">السلة فارغة</div>`;
        document.querySelector(".confirm-btn").style.display = "none";
        return;
      }

      container.innerHTML = "";

      let total = 0;

      cart.forEach(item => {
        total += item.price * item.qty;

        const div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
          <div class="name">${item.name_ar}</div>
          <div class="price">${item.price} ريال × ${item.qty}</div>
        `;

        container.appendChild(div);
      });

      document.getElementById("totalBox").textContent = `الإجمالي: ${total} ريال`;
    }

    async function confirmOrder() {
      if (cart.length === 0) return;

      const total = cart.reduce((sum, item) => sum + item.price * item.qty, 0);

      const { data, error } = await supabase
        .from("orders")
        .insert([
          {
            items: cart,
            total: total,
            status: "pending"
          }
        ])
        .select()
        .single();

      if (error) {
        alert("حدث خطأ أثناء إرسال الطلب");
        console.error(error);
        return;
      }

      // حفظ رقم الطلب للصفحة التالية
      localStorage.setItem("last_order_id", data.id);

      // تفريغ السلة
      localStorage.removeItem("cart");

      // الانتقال لصفحة النجاح
      window.location.href = "../success/";
    }

    loadCart();
  </script>

</body>
</html>
