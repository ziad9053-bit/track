<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <title>إتمام الطلب</title>

  <style>
    body {
      font-family: "Tajawal", sans-serif;
      background: #000;
      color: #fff;
      margin: 0;
      padding: 20px;
      direction: rtl;
    }

    h2 {
      text-align: center;
      color: #d4af37;
      margin-bottom: 20px;
    }

    .item {
      background: rgba(255,255,255,0.06);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 12px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .name {
      font-size: 18px;
      margin-bottom: 5px;
    }

    .price {
      color: #d4af37;
      margin-bottom: 10px;
    }

    .total-box {
      margin-top: 20px;
      font-size: 22px;
      text-align: center;
      color: #d4af37;
    }

    .input-box {
      margin-top: 20px;
      text-align: center;
    }

    input {
      width: 200px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 18px;
      text-align: center;
      margin-top: 10px;
    }

    .confirm-btn {
      background: #d4af37;
      color: #000;
      padding: 15px;
      border-radius: 10px;
      font-size: 20px;
      font-weight: bold;
      width: 100%;
      border: none;
      margin-top: 25px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h2>مراجعة الطلب</h2>

  <div id="cart"></div>

  <div class="total-box" id="totalBox"></div>

  <div class="input-box">
    <label>رقم الطاولة (إجباري)</label><br>
    <input type="number" id="tableNumber" placeholder="مثال: 12" />
  </div>

  <button class="confirm-btn" onclick="confirmOrder()">تأكيد الطلب</button>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabase = createClient(
      "https://motikwjgfgmegekygswy.supabase.co",
      "ضع_المفتاح_هنا"
    );

    const params = new URLSearchParams(window.location.search);
    const orderCode = params.get("code");

    let orderId = null;

    async function loadOrder() {
      // جلب order_id
      const { data: order } = await supabase
        .from("orders")
        .select("*")
        .eq("order_code", orderCode)
        .maybeSingle();

      orderId = order.id;

      // جلب الأصناف
      const { data: items } = await supabase
        .from("order_items")
        .select("*")
        .eq("order_id", orderId);

      // جلب المنتجات
      const { data: products } = await supabase
        .from("products")
        .select("*");

      const map = {};
      products.forEach(p => map[p.id] = p);

      render(items, map);
    }

    function render(items, map) {
      const container = document.getElementById("cart");
      const totalBox = document.getElementById("totalBox");

      if (!items || items.length === 0) {
        container.innerHTML = "<p style='text-align:center;opacity:0.7'>السلة فارغة</p>";
        return;
      }

      let total = 0;
      container.innerHTML = "";

      items.forEach(it => {
        const p = map[it.item_id];
        total += it.quantity * it.price;

        container.innerHTML += `
          <div class="item">
            <div class="name">${p.name_ar}</div>
            <div class="price">${it.price} ريال × ${it.quantity}</div>
          </div>
        `;
      });

      totalBox.textContent = `الإجمالي: ${total} ريال`;
    }

    // تأكيد الطلب
    async function confirmOrder() {
      const tableNumber = document.getElementById("tableNumber").value.trim();

      if (!tableNumber) {
        alert("يجب إدخال رقم الطاولة");
        return;
      }

      // تحديث حالة الطلب + رقم الطاولة
      const { error } = await supabase
        .from("orders")
        .update({
          table_number: tableNumber,
          status: "pending"
        })
        .eq("id", orderId);

      if (error) {
        alert("حدث خطأ أثناء تأكيد الطلب");
        return;
      }

      // الانتقال لصفحة التتبع
      window.location.href = `../../customer/track.html?code=${orderCode}`;
    }

    loadOrder();
  </script>

</body>
</html>
