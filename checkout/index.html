<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مراجعة وإتمام الطلب - Ritzy Roast</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: "Tajawal", sans-serif; background: #000; color: #fff; margin: 0; padding: 0; direction: rtl; display: flex; justify-content: center; padding-bottom: 110px; }
    .app-container { width: 100%; max-width: 480px; padding: 20px 16px; box-sizing: border-box; }
    h2 { text-align: center; color: #d4af37; margin-bottom: 25px; font-size: 26px; font-weight: 700; }
    .review-box { max-height: 250px; overflow-y: auto; margin-bottom: 20px; padding-right: 4px; }
    .item { background: rgba(255,255,255,0.06); padding: 14px; border-radius: 12px; margin-bottom: 12px; border: 1px solid rgba(212, 175, 55, 0.15); display: flex; justify-content: space-between; align-items: center; }
    .name { font-size: 17px; font-weight: 600; }
    .price { color: #d4af37; font-weight: 700; font-size: 15px; }
    .total-box { margin-top: 15px; font-size: 22px; text-align: center; color: #d4af37; font-weight: 700; border-bottom: 1px dashed rgba(212,175,55,0.2); padding-bottom: 15px; }
    .input-box { margin-top: 25px; text-align: center; }
    input { width: 100%; max-width: 180px; padding: 12px; border-radius: 10px; border: 1px solid #c5a059; background: #111; color: #fff; font-size: 20px; font-weight: bold; text-align: center; margin-top: 12px; box-shadow: 0 0 10px rgba(212,175,55,0.1); }
    .confirm-btn { background: #c5a059; color: #000; padding: 14px; border-radius: 12px; font-size: 18px; font-weight: bold; width: 100%; border: none; margin-top: 30px; cursor: pointer; transition: 0.25s; }
    .confirm-btn:hover { background: #d4af37; transform: translateY(-2px); }
    .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: #111; border-top: 1px solid #333; display: flex; justify-content: space-around; padding: 12px 0; z-index: 999; }
    .nav-item { color: #d4af37; font-size: 14px; text-decoration: none; display: flex; flex-direction: column; align-items: center; opacity: 0.7; }
  </style>
</head>

<body>
  <div class="app-container">
    <h2>مراجعة الطلب</h2>
    <div id="cart" class="review-box"></div>
    <div class="total-box" id="totalBox">جاري حساب المجموع...</div>
    <div class="input-box">
      <label>رقم الطاولة لتوصيل الطلب</label><br>
      <input type="number" id="tableNumber" placeholder="مثال: 5" />
    </div>
    <button class="confirm-btn" onclick="confirmOrder()">🔥 إرسال الطلب للمبارستا</button>
  </div>

  <div class="bottom-nav">
    <a href="../index.html" class="nav-item"><span>🏠</span><span>الرئيسية</span></a>
    <a href="../menu/index.html?category=hot" class="nav-item"><span>☕</span><span>ساخنة</span></a>
    <a href="../cart/index.html" class="nav-item"><span>🛒</span><span>السلة</span></a>
  </div>

  <script>
    // تهيئة Supabase بالمفتاح الجديد
    const supabase = supabase.createClient(
      "https://motikwjgfgmegekygswy.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1vdGlrd2pnZmdtZWdla3lnc3d5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNzc4MjQsImV4cCI6MjA5NDk1MzgyNH0.GWGDZ-WvjUeTLmgIfQxt6zDhZwN1C9GCHUh75ggSVdo"
    );

    const params = new URLSearchParams(window.location.search);
    const orderCode = params.get("code");
    let orderId = null;

    async function loadOrder() {
      if (!orderCode) return;
      const { data: order } = await supabase.from("orders").select("*").eq("order_code", orderCode).maybeSingle();
      if (!order) return;
      orderId = order.id;
      
      const { data: items } = await supabase.from("order_items").select("*").eq("order_id", orderId);
      const { data: menuItems } = await supabase.from("items").select("*");
      
      const map = {};
      menuItems?.forEach(p => map[p.id] = p);
      
      const container = document.getElementById("cart");
      let total = 0;
      container.innerHTML = "";
      items?.forEach(it => {
        const p = map[it.item_id] || { name_ar: "منتج" };
        total += it.quantity * it.price;
        container.innerHTML += `<div class="item"><div class="name">${p.name_ar}</div><div class="price">${it.price} ر.س × ${it.quantity}</div></div>`;
      });
      document.getElementById("totalBox").textContent = `الإجمالي: ${total} ر.س`;
    }

    async function confirmOrder() {
      const tableNumber = document.getElementById("tableNumber").value;
      if (!tableNumber) return alert("يرجى إدخال رقم الطاولة");
      
      await supabase.from("orders").update({ table_number: tableNumber, status: "pending" }).eq("id", orderId);
      window.location.href = `../customer/track.html?code=${orderCode}`;
    }

    loadOrder();
  </script>
</body>
</html>
