<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

  const db = createClient(
    "https://motikwjgfgmegekygswy.supabase.co",
    "sb_publishable_yjL5niVoL8Rtr2gF4i2J1w_T1TCjpEI"
  );

  function formatTime(createdAt) {
    if (!createdAt) return "";
    const date = new Date(createdAt);
    return date.toLocaleDateString("ar-EG", {
      month: "short",
      day: "numeric",
      hour: "2-digit",
      minute: "2-digit"
    });
  }

  async function loadPreviousOrders() {
    try {
      const { data, error } = await db
        .from("orders")
        .select("*")
        .eq("status", "ready")   // ← التعديل المهم
        .order("created_at", { ascending: false });

      if (error) throw error;

      const box = document.getElementById("list");
      box.innerHTML = "";

      if (!data || data.length === 0) {
        box.innerHTML =
          "<p style='text-align:center; opacity:0.5; padding-top:30px;'>لا توجد طلبات مكتملة حتى الآن.</p>";
        return;
      }

      data.forEach(o => {
        box.innerHTML += `
          <div class="order-card">
            <div class="right-side">
              <div class="code">طلب #${o.order_code || "---"}</div>
              <div class="table-info">📍 طاولة: ${o.table_number || "غير محددة"}</div>
            </div>
            <div class="left-side">
              <div class="time">📅 ${formatTime(o.created_at)}</div>
              <div class="price-tag">${o.total || 0} ريال</div>
            </div>
          </div>
        `;
      });
    } catch (err) {
      console.error("خطأ جلب الأرشيف:", err);
      document.getElementById("list").textContent =
        "فشل في تحميل السجل حالياً.";
    }
  }

  loadPreviousOrders();
</script>
