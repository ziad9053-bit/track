<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بوابة الموظفين - Ritzy Roast</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: "Tajawal", sans-serif;
      direction: rtl;
      text-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      width: 100%;
      max-width: 360px;
      padding: 30px 20px;
      box-sizing: border-box;
    }

    h2 {
      color: #d4af37;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    p {
      color: #888;
      font-size: 14px;
      margin-bottom: 30px;
    }

    /* حقل إدخال الرمز السري بطابع ذهبي زجاجي */
    input {
      padding: 14px;
      width: 100%;
      max-width: 200px;
      font-size: 24px;
      letter-spacing: 6px; /* لإعطاء مسافة فخمة بين نقاط كلمة السر */
      border-radius: 12px;
      border: 1px solid #c5a059;
      background: rgba(255, 255, 255, 0.04);
      color: #d4af37;
      text-align: center;
      outline: none;
      backdrop-filter: blur(8px);
      box-shadow: 0 0 15px rgba(212,175,55,0.1);
      box-sizing: border-box;
      transition: 0.3s;
    }

    input:focus {
      border-color: #d4af37;
      box-shadow: 0 0 25px rgba(212,175,55,0.25);
    }

    button {
      margin-top: 25px;
      padding: 12px 30px;
      background: #c5a059;
      border: none;
      border-radius: 10px;
      color: #000;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      max-width: 200px;
      box-shadow: 0 4px 15px rgba(197, 160, 89, 0.2);
      transition: .25s;
    }

    button:hover {
      background: #d4af37;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(212,175,55,0.4);
    }

    .error {
      margin-top: 15px;
      color: #ff5555;
      font-size: 14px;
      font-weight: 600;
      display: none;
      animation: shake 0.3s ease-in-out;
    }

    /* تأثير اهتزاز بسيط عند إدخال رمز خاطئ */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }
  </style>
</head>
<body>

  <div class="box">
    <h2>بوابة الموظفين</h2>
    <p>الرجاء إدخال رمز PIN المكون من 4 أرقام للدخول إلى لوحة البارستا</p>
    
    <input id="pin" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="4" placeholder="••••" autocomplete="off">
    <br>
    <button id="loginBtn">دخول</button>
    <div id="error" class="error">❌ رمز الدخول غير صحيح، حاول مجدداً.</div>
  </div>

  <script>
    const pinInput = document.getElementById("pin");
    const errorDiv = document.getElementById("error");
    const loginBtn = document.getElementById("loginBtn");

    // دالة التحقق من الرمز والاتصال باللوحة
    function checkPIN() {
      const pin = pinInput.value;
      
      if (pin === "2244") {
        window.location.href = "dashboard.html"; 
      } else {
        errorDiv.style.display = "block";
        pinInput.value = ""; // مسح الحقل لإعادة المحاولة فوراً
        pinInput.focus();
      }
    }

    // تفعيل خاصية التحقق التلقائي فور كتابة الرقم الرابع لسرعة العمل داخل الكافيه
    pinInput.addEventListener("input", function() {
      errorDiv.style.display = "none";
      
      if (this.value.length === 4) {
        checkPIN();
      }
    });

    // دعم الضغط على زر Enter من لوحة المفاتيح
    pinInput.addEventListener("keypress", function(event) {
      if (event.key === "Enter") {
        checkPIN();
      }
    });

    // ربط زر الدخول برمجياً لتجنب قيود البناء الصارمة
    loginBtn.addEventListener("click", checkPIN);

    // وضع مؤشر الكتابة تلقائياً داخل الحقل فور فتح الصفحة
    window.addEventListener("DOMContentLoaded", function() {
      pinInput.focus();
    });
  </script>

</body>
</html>
