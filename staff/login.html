<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <title>دخول الموظف</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: "Tajawal", sans-serif;
      direction: rtl;
      text-align: center;
    }

    .box {
      margin-top: 140px;
    }

    input {
      padding: 14px;
      width: 180px;
      font-size: 22px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: #d4af37;
      text-align: center;
      outline: none;
      backdrop-filter: blur(6px);
    }

    button {
      margin-top: 18px;
      padding: 12px 20px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      color: #d4af37;
      font-size: 18px;
      cursor: pointer;
      transition: 0.25s;
    }

    button:hover {
      background: rgba(255,255,255,0.2);
      transform: scale(1.05);
    }

    .error {
      margin-top: 12px;
      color: #ff5555;
      font-size: 16px;
      display: none;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>دخول الموظف</h2>

    <input id="pin" type="password" maxlength="4" placeholder="••••">

    <button onclick="checkPIN()">دخول</button>

    <div id="error" class="error">الرقم غير صحيح</div>
  </div>

  <script>
    function checkPIN() {
      const pin = document.getElementById("pin").value;

      if (pin === "2244") {
        window.location.href = "index.html";
      } else {
        document.getElementById("error").style.display = "block";
      }
    }
  </script>

</body>
</html>
