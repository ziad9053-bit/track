<script>
  const pinInput = document.getElementById("pin");
  const errorDiv = document.getElementById("error");
  const loginBtn = document.getElementById("loginBtn");

  function showError() {
    errorDiv.style.display = "block";
    errorDiv.style.animation = "none";
    void errorDiv.offsetWidth; // إعادة تشغيل الأنيميشن
    errorDiv.style.animation = "shake 0.3s ease-in-out";
  }

  function checkPIN() {
    const pin = pinInput.value;

    if (pin === "2244") {
      // المسار الصحيح داخل مشروعك
      window.location.href = "dashboard.html";
    } else {
      showError();
      pinInput.value = "";
      pinInput.focus();
    }
  }

  pinInput.addEventListener("input", function () {
    errorDiv.style.display = "none";
    if (this.value.length === 4) checkPIN();
  });

  pinInput.addEventListener("keypress", function (event) {
    if (event.key === "Enter") checkPIN();
  });

  loginBtn.addEventListener("click", checkPIN);

  window.addEventListener("DOMContentLoaded", () => pinInput.focus());
</script>
