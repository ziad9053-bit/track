<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>دخول العامل</title>

  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: "Tajawal", sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-box {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(212,175,55,0.3);
      padding: 30px;
      border-radius: 15px;
      width: 320px;
      text-align: center;
      box-shadow: 0 0 12px rgba(212,175,55,0.3);
    }

    h2 {
      color: #d4af37;
      margin-bottom: 20px;
      font-size: 26px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 2px solid #d4af37;
      background: #000;
      color: #fff;
      font-size: 20px;
      text-align: center;
      outline: none;
      margin-bottom: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(90deg, #d4af37, #b8962e);
      border: none;
      border-radius: 10px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      color: #000;
      box-shadow: 0 0 12px rgba(212,175,55,0.6);
    }

    #error {
      display: none;
      color: #ff4d4d;
      margin-top: 10px;
      font-size: 18px;
      font-weight: bold;
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-5px); }
      100% { transform: translateX(0); }
    }
  </style>
</head>

<body>

  <div class="login-box">
    <h2>دخول العامل</h2>

    <input type="password" id="pin" maxlength="4" placeholder="أدخل رمز الدخول">

    <button id="loginBtn">دخول</button>

    <div id="error">الرمز غير صحيح</div>
  </div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const pinInput = document.getElementById("pin");
  const errorDiv = document.getElementById("error");
  const loginBtn = document.getElementById("loginBtn");

  function showError() {
    errorDiv.style.display = "block";
    errorDiv.style.animation = "none";
    void errorDiv.offsetWidth;
    errorDiv.style.animation = "shake 0.3s ease-in-out";
  }

  function checkPIN() {
    const pin = pinInput.value.trim();

    if (pin === "2244") {
      window.location.href = "dashboard.html";
    } else {
      showError();
      pinInput.value = "";
      pinInput.focus();
    }
  }

  pinInput.addEventListener("input", () => {
    errorDiv.style.display = "none";
    if (pinInput.value.length === 4) checkPIN();
  });

  pinInput.addEventListener("keypress", (event) => {
    if (event.key === "Enter") checkPIN();
  });

  loginBtn.addEventListener("click", checkPIN);

  pinInput.focus();
});
</script>

</body>
</html>
