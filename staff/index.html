<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <title>لوحة الموظف - إدارة الطلبات</title>

  <style>
    body {
      font-family: "Tajawal", sans-serif;
      background: #000;
      color: #fff;
      padding: 30px;
      direction: rtl;
      text-align: center;
    }

    h2 {
      color: #d4af37;
      font-size: 32px;
      margin-bottom: 10px;
    }

    table {
      width: 95%;
      margin: auto;
      border-collapse: collapse;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      overflow: hidden;
      backdrop-filter: blur(6px);
      box-shadow: 0 0 25px rgba(212, 175, 55, 0.3);
    }

    th {
      background: #d4af37;
      color: #000;
      padding: 15px;
      font-size: 18px;
    }

    td {
      padding: 15px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 16px;
    }

    tr:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      color: white;
      font-weight: bold;
      margin: 3px;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .pending { background: #f0ad4e; }
    .preparing { background: #0275d8; }
    .ready { background: #5cb85c; }
    .served { background: #6c757d; }

    .status-box {
      padding: 6px 10px;
      border-radius: 6px;
      font-weight: bold;
      display: inline-block;
      color: #000;
    }

    .s-pending { background: #f0ad4e; }
    .s-preparing { background: #0275d8; color: #fff; }
    .s-ready { background: #5cb85c; }
    .s-served { background: #6c757d; color: #fff; }

  </style>
</head>

<body>

  <h2>لوحة الموظف - إدارة الطلبات</h2>
  <p style="color:#d4af37;">تحديث تلقائي كل 5 ثوانٍ</p>

  <table>
    <thead>
      <tr>
        <th>رقم الطلب</th>
        <th>الحالة</th>
        <th>تغيير الحالة</th>
      </tr>
    </thead>
    <tbody id="orders-table"></tbody>
  </table>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabase = createClient(
      "https://motikwjgfgmegekygswy.supabase.co",
      "ضع_المفتاح_هنا"
    );

    async function loadOrders() {
      const { data, error } = await supabase
        .from("orders")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        console.error(error);
        return;
      }

      const table = document.getElementById("orders-table");
      table.innerHTML = "";

      data.forEach(order => {
        const row = document.createElement("tr");

        row.innerHTML = `
          <td>${order.id}</td>
          <td>
            <span class="status-box s-${order.status}">
              ${order.status}
            </span>
          </td>
          <td>
            <button class="pending" onclick="updateStatus('${order.id}', 'pending')">Pending</button>
            <button class="preparing" onclick="updateStatus('${order.id}', 'preparing')">Preparing</button>
            <button class="ready" onclick="updateStatus('${order.id}', 'ready')">Ready</button>
            <button class="served" onclick="updateStatus('${order.id}', 'served')">Served</button>
          </td>
        `;

        table.appendChild(row);
      });
    }

    window.updateStatus = async function(id, status) {
      await supabase
        .from("orders")
        .update({ status })
        .eq("id", id);

      loadOrders();
    };

    loadOrders();
    setInterval(loadOrders, 5000);
  </script>

</body>
</html>
