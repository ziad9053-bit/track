<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <title>لوحة الموظف - الطلبات الجديدة</title>

  <style>
    body {
      font-family: "Tajawal", sans-serif;
      background: #000;
      color: #fff;
      padding: 25px;
      direction: rtl;
    }

    h2 {
      color: #d4af37;
      text-align: center;
      margin-bottom: 20px;
      font-size: 32px;
    }

    .order-card {
      background: rgba(255,255,255,0.06);
      padding: 18px;
      border-radius: 12px;
      margin-bottom: 15px;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .order-card:hover {
      background: rgba(255,255,255,0.12);
      transform: scale(1.02);
    }

    .title-new {
      color: #f0ad4e;
      font-size: 20px;
      font-weight: bold;
    }

    .details-box {
      background: rgba(255,255,255,0.08);
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
      display: none;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 18px;
      font-weight: bold;
      margin-top: 15px;
      width: 100%;
    }

    .ready-btn {
      background: #5cb85c;
      color: #000;
    }

    .ready-btn:hover {
      background: #4cae4c;
    }
  </style>
</head>

<body>

  <h2>لوحة الموظف – الطلبات الجديدة</h2>

  <div id="orders-list"></div>

  <div id="details" class="details-box"></div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabase = createClient(
      "https://motikwjgfgmegekygswy.supabase.co",
      "sb_publishable_yjL5niVoL8Rtr2gF4i2J1w_T1TCjpEI"
    );

    async function loadOrders() {
      const { data, error } = await supabase
        .from("orders")
        .select("*")
        .eq("status", "pending")
        .order("created_at", { ascending: false });

      if (error) return console.error(error);

      const list = document.getElementById("orders-list");
      list.innerHTML = "";

      data.forEach(order => {
        const card = document.createElement("div");
        card.className = "order-card";
        card.onclick = () => openDetails(order);

        card.innerHTML = `
          <div class="title-new">🔔 طلب جديد</div>
          <div>رقم الطاولة: ${order.table_number}</div>
          <div>وقت الطلب: ${new Date(order.created_at).toLocaleTimeString()}</div>
        `;

        list.appendChild(card);
      });
    }

    function openDetails(order) {
      const box = document.getElementById("details");
      box.style.display = "block";

      box.innerHTML = `
        <h3 style="color:#d4af37;">تفاصيل الطلب</h3>
        <p><strong>رقم الطاولة:</strong> ${order.table_number}</p>
        <p><strong>الملاحظات:</strong> ${order.notes || "لا يوجد"}</p>
        <p><strong>رقم الطلب:</strong> ${order.id}</p>

        <button class="ready-btn" onclick="markReady('${order.id}')">
          ✔ جاهز
        </button>
      `;
    }

    window.markReady = async function(id) {
      await supabase
        .from("orders")
        .update({ status: "ready" })
        .eq("id", id);

      document.getElementById("details").style.display = "none";
      loadOrders();
    };

    loadOrders();
    setInterval(loadOrders, 3000);
  </script>

</body>
</html>
