<script>
  // إنشاء عميل Supabase
  const db = supabase.createClient(
    "https://motikwjgfgmegekygswy.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1vdGlrd2pnZmdtZWdla3lnc3d5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNzc4MjQsImV4cCI6MjA5NDk1MzgyNH0.GWGDZ-WvjUeTLmgIfQxt6zDhZwN1C9GCHUh75ggSVdo"
  );

  async function loadData() {
    try {
      const { data: orders, error: orderErr } = await db
        .from("orders")
        .select("*")
        .order("created_at", { ascending: false });

      if (orderErr) throw orderErr;

      renderOrders(orders || []);
    } catch (err) {
      console.error("خطأ في تحميل الطلبات:", err);
    }
  }

  function renderOrders(orders) {
    document.getElementById("newOrders").innerHTML =
      generateCardsHtml(orders.filter(o => o.status === "pending"));

    document.getElementById("inProgress").innerHTML =
      generateCardsHtml(orders.filter(o => o.status === "in_progress"));

    document.getElementById("readyOrders").innerHTML =
      generateCardsHtml(orders.filter(o => o.status === "ready"));
  }

  function generateCardsHtml(list) {
    return list.map(o => `
      <div class="order" onclick="openDetails('${o.id}')">
        <div style="color:#d4af37; font-weight:bold;">طلب #${o.order_code}</div>
        <div>طاولة: ${o.table_number || "-"}</div>
      </div>
    `).join("");
  }

  window.openDetails = async function(orderId) {
    const box = document.getElementById("details");

    try {
      const { data: order } = await db
        .from("orders")
        .select("*")
        .eq("id", orderId)
        .maybeSingle();

      const { data: items } = await db
        .from("order_items")
        .select("*, items(name_ar)")
        .eq("order_id", orderId);

      let itemsHtml = "";
      items?.forEach(it => {
        itemsHtml += `
          <div style="margin-bottom:8px;">
            ${it.items.name_ar} — ${it.quantity} × ${it.price} ريال
          </div>
        `;
      });

      box.innerHTML = `
        <h3>تفاصيل طلب #${order.order_code}</h3>
        <div style="margin-bottom:15px;">${itemsHtml}</div>

        <button class="status-btn" style="background:#0275d8; color:#fff;"
          onclick="updateStatus('${order.id}', 'in_progress')">
          بدء التحضير
        </button>

        <button class="status-btn" style="background:#5cb85c; color:#000;"
          onclick="updateStatus('${order.id}', 'ready')">
          تم التحضير
        </button>
      `;

      box.style.display = "block";

    } catch (err) {
      console.error("خطأ في جلب تفاصيل الطلب:", err);
    }
  };

  let updating = false;

  window.updateStatus = async function(id, status) {
    if (updating) return;
    updating = true;

    try {
      await db.from("orders").update({ status }).eq("id", id);
      document.getElementById("details").style.display = "none";
      loadData();
    } catch (err) {
      console.error("خطأ في تحديث الحالة:", err);
    }

    updating = false;
  };

  loadData();
  setInterval(loadData, 5000);
</script>
