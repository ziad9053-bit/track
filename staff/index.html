<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <title>لوحة الموظف - Ritzy Roast</title>

  <!-- مكتبة Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: "Tajawal", sans-serif;
      direction: rtl;
    }

    .header {
      text-align: center;
      padding: 25px 0;
      font-size: 28px;
      color: #d4af37;
      font-weight: 700;
      text-shadow: 0 0 12px rgba(212,175,55,0.4);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(6px);
    }

    .orders {
      padding: 20px;
    }

    .order-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 22px rgba(0,0,0,0.5);
      transition: 0.25s;
    }

    .order-card:hover {
      transform: scale(1.02);
      box-shadow: 0 0 28px rgba(212,175,55,0.25);
    }

    .order-title {
      font-size: 22px;
      color: #d4af37;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .order-info {
      font-size: 17px;
      margin-bottom: 6px;
      opacity: 0.9;
    }

    .status {
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 12px;
      display: inline-block;
      font-size: 16px;
      font-weight: 700;
    }

    .status-preparing {
      background: rgba(212,175,55,0.2);
      color: #d4af37;
      border: 1px solid rgba(212,175,55,0.4);
    }

    .status-ready {
      background: rgba(0,255,0,0.15);
      color: #00ff88;
      border: 1px solid rgba(0,255,0,0.3);
    }

    .status-done {
      background: rgba(0,150,255,0.15);
      color: #4db8ff;
      border: 1px solid rgba(0,150,255,0.3);
    }

    .btn {
      margin-top: 14px;
      padding: 12px 20px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      color: #d4af37;
      font-size: 16px;
      cursor: pointer;
      transition: 0.25s;
      backdrop-filter: blur(6px);
      font-weight: 600;
    }

    .btn:hover {
      background: rgba(255,255,255,0.18);
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <div class="header">لوحة الموظف</div>

  <div class="orders" id="ordersContainer">
    <!-- الطلبات تظهر هنا -->
  </div>

  <script>
    // إعداد Supabase
    const supabaseUrl = "YOUR_PROJECT_URL";
    const supabaseKey = "YOUR_ANON_KEY";
    const db = supabase.createClient(supabaseUrl, supabaseKey);

    // تحميل الطلبات
    async function loadOrders() {
      const { data, error } = await db
        .from("orders")
        .select("*")
        .order("id", { ascending: false });

      if (error) {
        console.log("خطأ:", error);
        return;
      }

      renderOrders(data);
    }

    // عرض الطلبات
    function renderOrders(orders) {
      const container = document.getElementById("ordersContainer");
      container.innerHTML = "";

      orders.forEach(order => {
        container.innerHTML += `
          <div class="order-card">
            <div class="order-title">طلب #${order.id}</div>
            <div class="order-info">العميل: ${order.customer || "غير محدد"}</div>
            <div class="order-info">الوقت: ${order.time}</div>
            <div class="order-info">النوع: ${order.type}</div>

            <div class="status status-${order.status}">
              ${translateStatus(order.status)}
            </div>

            <button class="btn" onclick="changeStatus(${order.id}, '${order.status}')">
              تغيير الحالة
            </button>
          </div>
        `;
      });
    }

    // ترجمة الحالة
    function translateStatus(status) {
      if (status === "preparing") return "قيد التحضير";
      if (status === "ready") return "جاهز";
      if (status === "done") return "مكتمل";
    }

    // تغيير حالة الطلب
    async function changeStatus(id, currentStatus) {
      let nextStatus = "ready";

      if (currentStatus === "ready") nextStatus = "done";
      if (currentStatus === "done") nextStatus = "done";

      await db
        .from("orders")
        .update({ status: nextStatus })
        .eq("id", id);

      loadOrders();
    }

    // تشغيل الصفحة
    loadOrders();
    setInterval(loadOrders, 5000);
  </script>

</body>
</html>
