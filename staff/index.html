<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>لوحة العامل - Ritzy Roast</title>

  <style>
    body {
      background: #000;
      color: #fff;
      font-family: "Tajawal", sans-serif;
      direction: rtl;
      margin: 0;
      padding: 20px;
    }

    h2 {
      text-align: center;
      color: #d4af37;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 22px;
      color: #d4af37;
      margin-top: 25px;
      margin-bottom: 10px;
      border-bottom: 1px solid #333;
      padding-bottom: 5px;
    }

    .order {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 12px;
      cursor: pointer;
    }

    .order:hover {
      background: rgba(255,255,255,0.12);
    }

    .order-header {
      font-size: 18px;
      font-weight: bold;
      color: #d4af37;
      margin-bottom: 6px;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 8px;
      font-weight: bold;
    }

    .pending-badge { background: #f0ad4e; color: #000; }
    .progress-badge { background: #0275d8; color: #fff; }
    .ready-badge    { background: #5cb85c; color: #000; }
    .done-badge     { background: #999; color: #000; }

    .time {
      font-size: 14px;
      opacity: 0.8;
      margin-top: 5px;
    }

    .details-box {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 15px;
      border-radius: 12px;
      margin-top: 20px;
      display: none;
    }

    .item {
      margin-bottom: 8px;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .status-btn {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    .start { background: #0275d8; }
    .ready { background: #5cb85c; }
    .done  { background: #999; }

    .nav-btn {
      margin: 20px 0;
      padding: 12px 20px;
      background: #111;
      border: 1px solid #444;
      border-radius: 12px;
      color: #d4af37;
      font-size: 16px;
      cursor: pointer;
      display: inline-block;
    }
  </style>
</head>

<body>

<h2>لوحة العامل</h2>

<!-- زر الطلبات السابقة -->
<a href="previous.html">
  <button class="nav-btn">الطلبات السابقة</button>
</a>

<div id="newOrders"></div>
<div id="inProgress"></div>
<div id="readyOrders"></div>
<div id="completedOrders"></div>

<div id="details" class="details-box"></div>

<audio id="newSound">
  <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
</audio>

<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

  const supabase = createClient(
    "https://motikwjgfgmegekygswy.supabase.co",
    "sb_publishable_yjL5niVoL8Rtr2gF4i2J1w_T1TCjpEI"
  );

  let lastNewCount = 0;

  function formatTime(createdAt) {
    const diff = Math.floor((Date.now() - new Date(createdAt)) / 1000);
    const min = Math.floor(diff / 60);
    const sec = diff % 60;
    return `${min} دقيقة و ${sec} ثانية`;
  }

  async function load() {
    const { data: orders } = await supabase
      .from("orders")
      .select("*")
      .order("created_at", { ascending: true });

    const { data: items } = await supabase
      .from("order_items")
      .select("*");

    const { data: products } = await supabase
      .from("products")
      .select("id, name_ar");

    const map = {};
    products.forEach(p => map[p.id] = p.name_ar);

    render(orders, items, map);
  }

  function render(orders, items, map) {
    const newOrders = orders.filter(o => o.status === "pending");
    const inProgress = orders.filter(o => o.status === "in_progress");
    const ready = orders.filter(o => o.status === "ready");
    const done = orders.filter(o => o.status === "done");

    if (newOrders.length > lastNewCount) {
      document.getElementById("newSound").play().catch(()=>{});
    }
    lastNewCount = newOrders.length;

    document.getElementById("newOrders").innerHTML =
      section("طلبات جديدة", newOrders, items, map);

    document.getElementById("inProgress").innerHTML =
      section("قيد التحضير", inProgress, items, map);

    document.getElementById("readyOrders").innerHTML =
      section("جاهزة للاستلام", ready, items, map);

    document.getElementById("completedOrders").innerHTML =
      section("مكتملة", done, items, map);
  }

  function badge(status) {
    if (status === "pending") return `<span class="badge pending-badge">🟡 جديد</span>`;
    if (status === "in_progress") return `<span class="badge progress-badge">🔵 قيد التحضير</span>`;
    if (status === "ready") return `<span class="badge ready-badge">🟢 جاهز</span>`;
    if (status === "done") return `<span class="badge done-badge">⚪ مكتمل</span>`;
  }

  function section(title, list, items, map) {
    let html = `<div class="section-title">${title}</div>`;

    list.forEach(order => {
      html += `
        <div class="order" onclick="openDetails(${order.id})">
          <div class="order-header">طلب #${order.order_code} — طاولة ${order.table_number}</div>
          ${badge(order.status)}
          <div class="time">⏱ منذ ${formatTime(order.created_at)}</div>
        </div>
      `;
    });

    return html;
  }

  window.openDetails = function(orderId) {
    showDetails(orderId);
  };

  async function showDetails(orderId) {
    const { data: order } = await supabase
      .from("orders")
      .select("*")
      .eq("id", orderId)
      .maybeSingle();

    const { data: items } = await supabase
      .from("order_items")
      .select("*")
      .eq("order_id", orderId);

    const { data: products } = await supabase
      .from("products")
      .select("id, name_ar");

    const map = {};
    products.forEach(p => map[p.id] = p.name_ar);

    let html = `
      <h3 style="color:#d4af37;text-align:center">تفاصيل الطلب #${order.order_code}</h3>
      <div class="time">⏱ منذ ${formatTime(order.created_at)}</div>
      ${badge(order.status)}
    `;

    items.forEach(it => {
      html += `
        <div class="item">
          ${map[it.item_id]} — ${it.quantity} × ${it.price} ريال
        </div>
      `;
    });

    if (order.status === "pending") {
      html += `<button class="status-btn start" onclick="updateStatus(${order.id}, 'in_progress')">بدء التحضير</button>`;
    }

    if (order.status === "in_progress") {
      html += `<button class="status-btn ready" onclick="updateStatus(${order.id}, 'ready')">جاهز</button>`;
    }

    if (order.status === "ready") {
      html += `<button class="status-btn done" onclick="updateStatus(${order.id}, 'done')">مكتمل</button>`;
    }

    const box = document.getElementById("details");
    box.innerHTML = html;
    box.style.display = "block";
  }

  window.updateStatus = async function(id, status) {
    await supabase
      .from("orders")
      .update({ status })
      .eq("id", id);

    document.getElementById("details").style.display = "none";
    load();
  };

  load();
  setInterval(load, 1000);
</script>

</body>
</html>
