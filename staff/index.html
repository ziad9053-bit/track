<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <title>لوحة الموظف - Ritzy Roast</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: "Tajawal", sans-serif;
      direction: rtl;
    }

    .header {
      text-align: center;
      padding: 25px 0;
      font-size: 26px;
      color: #d4af37;
      font-weight: 600;
      text-shadow: 0 0 10px rgba(212,175,55,0.4);
    }

    .orders {
      padding: 20px;
    }

    .order-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 18px;
      backdrop-filter: blur(8px);
      box-shadow: 0 0 18px rgba(0,0,0,0.5);
      transition: 0.25s;
    }

    .order-card:hover {
      transform: scale(1.02);
      box-shadow: 0 0 25px rgba(212,175,55,0.25);
    }

    .order-title {
      font-size: 20px;
      color: #d4af37;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .order-info {
      font-size: 16px;
      margin-bottom: 6px;
      opacity: 0.9;
    }

    .status {
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 10px;
      display: inline-block;
      font-size: 15px;
      font-weight: 600;
    }

    .status-preparing {
      background: rgba(212,175,55,0.2);
      color: #d4af37;
      border: 1px solid rgba(212,175,55,0.4);
    }

    .status-ready {
      background: rgba(0,255,0,0.15);
      color: #00ff88;
      border: 1px solid rgba(0,255,0,0.3);
    }

    .status-done {
      background: rgba(0,150,255,0.15);
      color: #4db8ff;
      border: 1px solid rgba(0,150,255,0.3);
    }

    .btn {
      margin-top: 12px;
      padding: 10px 18px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      color: #d4af37;
      font-size: 15px;
      cursor: pointer;
      transition: 0.25s;
      backdrop-filter: blur(6px);
    }

    .btn:hover {
      background: rgba(255,255,255,0.18);
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <div class="header">لوحة الموظف</div>

  <div class="orders">

    <!-- مثال لطلب -->
    <div class="order-card">
      <div class="order-title">طلب #1024</div>
      <div class="order-info">العميل: غير محدد</div>
      <div class="order-info">الوقت: 10:32 صباحاً</div>
      <div class="order-info">النوع: مشروب بارد</div>

      <div class="status status-preparing">قيد التحضير</div>

      <button class="btn">تغيير الحالة</button>
    </div>

    <!-- تكرار الطلبات هنا -->
  </div>

</body>
</html>
