<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <title>لوحة الموظف - Ritzy Roast</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body{margin:0;padding:0;background:#000;color:#fff;font-family:"Tajawal",sans-serif;direction:rtl}
    .header{text-align:center;padding:25px 0;font-size:28px;color:#d4af37;font-weight:700}
    .orders{padding:20px}
    .order-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:16px;padding:20px;margin-bottom:20px}
    .order-title{font-size:20px;color:#d4af37;font-weight:700;margin-bottom:6px}
    .item-row{display:flex;justify-content:space-between;margin-bottom:6px;font-size:15px}
    .btn{margin-top:10px;padding:10px 16px;background:#222;border:1px solid #444;border-radius:12px;color:#d4af37;font-size:14px;cursor:pointer}
    .footer-btn{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:12px 20px;background:#111;border:1px solid #444;border-radius:12px;color:#d4af37;font-size:16px}
  </style>
</head>

<body>

  <div class="header">الطلبات الحالية</div>

  <audio id="newOrderSound" src="../sounds/new-order.mp3"></audio>

  <div id="ordersContainer" class="orders"></div>

  <a href="previous.html">
    <button class="footer-btn">الطلبات السابقة</button>
  </a>

<script>
const db = supabase.createClient("YOUR_URL","YOUR_KEY");
let lastOrderIds = [];

async function loadOrders(){
  const { data: orders } = await db
    .from("orders")
    .select("*")
    .eq("status","pending")
    .order("created_at",{ascending:false});

  const ids = orders.map(o=>o.id);
  if(lastOrderIds.length){
    const newOnes = ids.filter(id=>!lastOrderIds.includes(id));
    if(newOnes.length){
      document.getElementById("newOrderSound").play().catch(()=>{});
    }
  }
  lastOrderIds = ids;

  const { data: items } = await db.from("order_items").select("*").in("order_id", ids);
  const { data: products } = await db.from("products").select("*");

  const map = {};
  products.forEach(p=>map[p.id]=p);

  render(orders, items, map);
}

function render(orders, items, map){
  const box = document.getElementById("ordersContainer");
  box.innerHTML = "";

  orders.forEach(order=>{
    const list = items.filter(i=>i.order_id===order.id);

    let html = `
      <div class="order-card">
        <div class="order-title">${order.order_code}</div>
    `;

    list.forEach(it=>{
      const p = map[it.item_id] || {};
      const name = p.name_ar || p.name_en || it.item_id;
      html += `
        <div class="item-row">
          <div>${name}</div>
          <div>x${it.quantity}</div>
        </div>
      `;
    });

    html += `
      <button class="btn" onclick="setStatus('${order.id}','ready')">جاهز</button>
      <button class="btn" onclick="setStatus('${order.id}','pending')">جديد</button>
      </div>
    `;

    box.innerHTML += html;
  });
}

async function setStatus(id,status){
  await db.from("orders").update({status}).eq("id",id);
  loadOrders();
}

loadOrders();
setInterval(loadOrders,3000);
</script>

</body>
</html>
