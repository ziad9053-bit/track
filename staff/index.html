<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <title>لوحة الموظف - الطلبات الجديدة</title>

  <style>
    body {
      font-family: "Tajawal", sans-serif;
      background: #000;
      color: #fff;
      padding: 25px;
      direction: rtl;
    }

    h2 {
      color: #d4af37;
      text-align: center;
      margin-bottom: 10px;
      font-size: 32px;
    }

    .subtitle {
      text-align: center;
      color: #aaa;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .order-card {
      background: rgba(255,255,255,0.06);
      padding: 18px;
      border-radius: 12px;
      margin-bottom: 15px;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .order-card:hover {
      background: rgba(255,255,255,0.12);
      transform: scale(1.02);
    }

    .title-new {
      color: #f0ad4e;
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .time-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      font-size: 13px;
      margin-top: 5px;
    }

    .details-box {
      background: rgba(255,255,255,0.08);
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
      display: none;
    }

    .details-box h3 {
      margin-top: 0;
      color: #d4af37;
    }

    .label {
      font-weight: bold;
      color: #d4af37;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 18px;
      font-weight: bold;
      margin-top: 15px;
      width: 100%;
    }

    .ready-btn {
      background: #5cb85c;
      color: #000;
    }

    .ready-btn:hover {
      background: #4cae4c;
    }

    .empty-state {
      text-align: center;
      margin-top: 40px;
      color: #777;
      font-size: 16px;
    }

    .spinner {
      border: 4px solid rgba(255,255,255,0.1);
      border-top: 4px solid #d4af37;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      animation: spin 1s linear infinite;
      margin: 10px auto 0;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

  <h2>لوحة الموظف – الطلبات الجديدة</h2>
  <div class="subtitle">يتم التحديث تلقائيًا كل 3 ثوانٍ</div>

  <div id="orders-list"></div>

  <div id="empty-state" class="empty-state" style="display:none;">
    لا توجد طلبات حاليًا<br />
    <div class="spinner"></div>
  </div>

  <div id="details" class="details-box"></div>

  <!-- صوت تنبيه للموظف عند وجود طلب جديد -->
  <audio id="new-order-sound">
    <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
  </audio>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabase = createClient(
      "https://motikwjgfgmegekygswy.supabase.co",
      "ضع_المفتاح_هنا"
    );

    let lastOrderIds = new Set();

    function formatDuration(createdAt) {
      const created = new Date(createdAt);
      const now = new Date();
      const diffMs = now - created;
      const diffSec = Math.floor(diffMs / 1000);
      const min = Math.floor(diffSec / 60);
      const sec = diffSec % 60;
      return `${min} دقيقة و ${sec} ثانية`;
    }

    async function loadOrders(playSoundIfNew = true) {
      const { data, error } = await supabase
        .from("orders")
        .select("*")
        .eq("status", "pending")
        .order("created_at", { ascending: false });

      if (error) {
        console.error(error);
        return;
      }

      const list = document.getElementById("orders-list");
      const emptyState = document.getElementById("empty-state");
      list.innerHTML = "";

      if (!data || data.length === 0) {
        emptyState.style.display = "block";
        lastOrderIds = new Set();
        return;
      } else {
        emptyState.style.display = "none";
      }

      const currentIds = new Set(data.map(o => o.id));

      // لو في طلب جديد لم يكن موجودًا من قبل → شغّل الصوت
      if (playSoundIfNew) {
        const hasNew = data.some(o => !lastOrderIds.has(o.id));
        if (hasNew) {
          const audio = document.getElementById("new-order-sound");
          audio.currentTime = 0;
          audio.play().catch(() => {});
        }
      }

      lastOrderIds = currentIds;

      data.forEach(order => {
        const card = document.createElement("div");
        card.className = "order-card";
        card.onclick = () => openDetails(order);

        card.innerHTML = `
          <div class="title-new">🔔 طلب جديد</div>
          <div>رقم الطاولة: ${order.table_number}</div>
          <div class="time-badge">
            منذ ${formatDuration(order.created_at)}
          </div>
        `;

        list.appendChild(card);
      });
    }

    function openDetails(order) {
      const box = document.getElementById("details");
      box.style.display = "block";

      // الأصناف: إذا كانت JSON نحاول نعرضها بشكل جميل
      let itemsView = "لا يوجد";
      if (order.items) {
        try {
          const parsed = typeof order.items === "string"
            ? JSON.parse(order.items)
            : order.items;

          if (Array.isArray(parsed)) {
            itemsView = "<ul>" + parsed.map(i => `<li>${i}</li>`).join("") + "</ul>";
          } else {
            itemsView = String(order.items);
          }
        } catch {
          itemsView = String(order.items);
        }
      }

      box.innerHTML = `
        <h3>تفاصيل الطلب</h3>
        <p><span class="label">رقم الطاولة:</span> ${order.table_number}</p>
        <p><span class="label">الأصناف:</span><br /> ${itemsView}</p>
        <p><span class="label">الملاحظات:</span> ${order.notes || "لا يوجد"}</p>
        <p><span class="label">السعر:</span> ${order.total_price != null ? order.total_price + " ريال" : "غير محدد"}</p>
        <p><span class="label">منذ:</span> ${formatDuration(order.created_at)}</p>
        <p><span class="label">رقم الطلب:</span> ${order.id}</p>

        <button class="ready-btn" onclick="markReady('${order.id}')">
          ✔ جاهز
        </button>
      `;
    }

    window.markReady = async function(id) {
      await supabase
        .from("orders")
        .update({ status: "ready" })
        .eq("id", id);

      document.getElementById("details").style.display = "none";
      loadOrders(false);
    };

    loadOrders(false);
    setInterval(() => loadOrders(true), 3000);
  </script>

</body>
</html>
