  );

  const urlParams = new URLSearchParams(window.location.search);
  const currentCategory = urlParams.get("category") || "hot";

  window.addItem = async function(id, price) {
    let orderCode = localStorage.getItem("currentOrderCode");
    let orderId;

    if (!orderCode) {
      orderCode = "RR-" + Math.floor(1000 + Math.random() * 9000);
      localStorage.setItem("currentOrderCode", orderCode);
      
      const { data, error } = await supabase.from("orders").insert({
        order_code: orderCode,
        status: "pending",
        total: 0
      }).select().single();
      
      if (error) return alert("خطأ في الاتصال، حاول مجدداً.");
      orderId = data.id;
    } else {
      const { data, error } = await supabase
        .from("orders")
        .select("id")
        .eq("order_code", orderCode)
        .maybeSingle();

      if (error || !data) {
        localStorage.removeItem("currentOrderCode");
        return alert("تعذر العثور على طلبك، يرجى إعادة تحميل الصفحة.");
      }
      orderId = data.id;
    }

    const { error: insertErr } = await supabase.from("order_items").insert({
      order_id: orderId,
      item_id: id,
      quantity: 1,
      price: price
    });
    
    if (insertErr) return alert("فشل إضافة الصنف للسلة.");
    
    alert("✅ تمت الإضافة للسلة!");
  };

  fetchMenu();
</script>
