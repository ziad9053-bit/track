<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>السلة</title>

  <style>
    body {
      font-family: "Tajawal", sans-serif;
      background: #000;
      color: #fff;
      margin: 0;
      padding: 20px;
      direction: rtl;
    }

    h2 {
      text-align: center;
      color: #d4af37;
      margin-bottom: 20px;
      font-size: 26px;
      font-weight: 700;
    }

    .cart-item {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 12px;
      gap: 12px;
    }

    .cart-item img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 10px;
    }

    .info {
      flex: 1;
    }

    .name {
      font-size: 18px;
      font-weight: 600;
    }

    .price {
      color: #d4af37;
      margin: 6px 0;
      font-size: 16px;
      font-weight: 700;
    }

    .qty-box {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .qty-btn {
      background: #d4af37;
      color: #000;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 16px;
    }

    .remove-btn {
      background: #ff4444;
      color: #fff;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
    }

    .total {
      text-align: center;
      font-size: 20px;
      margin-top: 20px;
      color: #d4af37;
      font-weight: 700;
    }

    .checkout-btn {
      width: 100%;
      padding: 14px;
      background: #d4af37;
      color: #000;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <h2>السلة</h2>

  <div id="cart"></div>

  <div id="total" class="total"></div>

  <button class="checkout-btn" onclick="checkout()">إتمام الطلب</button>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabase = createClient(
      "https://motikwjgfgmegekygswy.supabase.co",
      "sb_publishable_yjL5niVoL8Rtr2gF4i2J1w_T1TCjpEI"
    );

    const params = new URLSearchParams(window.location.search);
    const orderCode = params.get("code");

    let orderId = null;

    async function loadOrderId() {
      const { data } = await supabase
        .from("orders")
        .select("id")
        .eq("order_code", orderCode)
        .maybeSingle();

      orderId = data?.id;
    }

    async function loadCart() {
      await loadOrderId();

      const { data: items } = await supabase
        .from("order_items")
        .select("*")
        .eq("order_id", orderId);

      const { data: products } = await supabase
        .from("products")
        .select("*");

      const map = {};
      products.forEach(p => {
        // توليد رابط الصورة من image_path
        const { data: imgData } = supabase
          .storage
          .from("products")
          .getPublicUrl(p.image_path);

        const imageUrl = imgData.publicUrl;
        map[p.id] = { ...p, image_url: imageUrl };
      });

      const container = document.getElementById("cart");
      const totalBox = document.getElementById("total");

      container.innerHTML = "";

      if (!items || items.length === 0) {
        container.innerHTML = "<p style='text-align:center;opacity:0.7'>السلة فارغة</p>";
        totalBox.textContent = "";
        return;
      }

      let total = 0;

      items.forEach(it => {
        const p = map[it.item_id];
        total += it.quantity * it.price;

        const div = document.createElement("div");
        div.className = "cart-item";

        div.innerHTML = `
          <img src="${p.image_url}">
          <div class="info">
            <div class="name">${p.name_ar}</div>
            <div class="price">${it.price} ريال</div>

            <div class="qty-box">
              <button class="qty-btn" onclick="changeQty('${it.id}', 1)">+</button>
              <span>${it.quantity}</span>
              <button class="qty-btn" onclick="changeQty('${it.id}', -1)">-</button>
            </div>
          </div>

          <button class="remove-btn" onclick="removeItem('${it.id}')">حذف</button>
        `;

        container.appendChild(div);
      });

      totalBox.textContent = `المجموع: ${total} ريال`;
    }

    window.changeQty = async function(id, amount) {
      const { data } = await supabase
        .from("order_items")
        .select("quantity")
        .eq("id", id)
        .maybeSingle();

      let qty = data.quantity + amount;
      if (qty <= 0) {
        await removeItem(id);
        return;
      }

      await supabase
        .from("order_items")
        .update({ quantity: qty })
        .eq("id", id);

      loadCart();
    };

    window.removeItem = async function(id) {
      await supabase
        .from("order_items")
        .delete()
        .eq("id", id);

      loadCart();
    };

    window.checkout = function() {
      window.location.href = `../checkout/?code=${orderCode}`;
    };

    loadCart();
  </script>

</body>
</html>
