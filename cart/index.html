<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>السلة</title>

  <style>
    body {
      font-family: "Tajawal", sans-serif;
      background: #000;
      color: #fff;
      margin: 0;
      padding: 20px;
      direction: rtl;
    }

    h2 {
      text-align: center;
      color: #d4af37;
      margin-bottom: 20px;
      font-size: 26px;
      font-weight: 700;
    }

    .cart-item {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 12px;
      gap: 12px;
    }

    .cart-item img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 10px;
    }

    .info {
      flex: 1;
    }

    .name {
      font-size: 18px;
      font-weight: 600;
    }

    .price {
      color: #d4af37;
      margin: 6px 0;
      font-size: 16px;
      font-weight: 700;
    }

    .qty-box {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .qty-btn {
      background: #d4af37;
      color: #000;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 16px;
    }

    .remove-btn {
      background: #ff4444;
      color: #fff;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
    }

    .total {
      text-align: center;
      font-size: 20px;
      margin-top: 20px;
      color: #d4af37;
      font-weight: 700;
    }

    .checkout-btn {
      width: 100%;
      padding: 14px;
      background: #d4af37;
      color: #000;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <h2>السلة</h2>

  <div id="cart"></div>

  <div id="total" class="total"></div>

  <button class="checkout-btn" onclick="checkout()">إتمام الطلب</button>

  <script>
    function loadCart() {
      let cart = JSON.parse(localStorage.getItem("cart") || "[]");
      const container = document.getElementById("cart");
      const totalBox = document.getElementById("total");

      container.innerHTML = "";

      if (cart.length === 0) {
        container.innerHTML = "<p style='text-align:center;opacity:0.7'>السلة فارغة</p>";
        totalBox.textContent = "";
        return;
      }

      let total = 0;

      cart.forEach(item => {
        total += item.price * item.qty;

        const div = document.createElement("div");
        div.className = "cart-item";

        div.innerHTML = `
          <img src="${item.image_url}">
          <div class="info">
            <div class="name">${item.name_ar}</div>
            <div class="price">${item.price} ريال</div>

            <div class="qty-box">
              <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
              <span>${item.qty}</span>
              <button class="qty-btn" onclick="changeQty(${item.id}, -1)">-</button>
            </div>
          </div>

          <button class="remove-btn" onclick="removeItem(${item.id})">حذف</button>
        `;

        container.appendChild(div);
      });

      totalBox.textContent = `المجموع: ${total} ريال`;
    }

    function changeQty(id, amount) {
      let cart = JSON.parse(localStorage.getItem("cart") || "[]");

      const item = cart.find(i => i.id === id);
      if (!item) return;

      item.qty += amount;

      if (item.qty <= 0) {
        cart = cart.filter(i => i.id !== id);
      }

      localStorage.setItem("cart", JSON.stringify(cart));
      loadCart();
    }

    function removeItem(id) {
      let cart = JSON.parse(localStorage.getItem("cart") || "[]");
      cart = cart.filter(i => i.id !== id);
      localStorage.setItem("cart", JSON.stringify(cart));
      loadCart();
    }

    function checkout() {
      window.location.href = "../customer/new.html";
    }

    loadCart();
  </script>

</body>
</html>
