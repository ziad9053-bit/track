<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>السلة - Ritzy Roast</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* (تم الاحتفاظ بجميع التنسيقات الفخمة التي أرسلتها سابقاً) */
    body { font-family: "Tajawal", sans-serif; background: #000; color: #fff; margin: 0; padding: 0; direction: rtl; display: flex; justify-content: center; padding-bottom: 110px; }
    .app-container { width: 100%; max-width: 480px; padding: 20px 16px; box-sizing: border-box; }
    h2 { text-align: center; color: #d4af37; margin-bottom: 25px; font-size: 26px; font-weight: 700; }
    .cart-item { display: flex; align-items: center; background: rgba(255,255,255,0.06); border: 1px solid rgba(212, 175, 55, 0.2); padding: 12px; border-radius: 12px; margin-bottom: 14px; gap: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    .cart-item img { width: 75px; height: 75px; object-fit: cover; border-radius: 8px; border: 1px solid #d4af37; }
    .info { flex: 1; text-align: right; }
    .name { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
    .price { color: #d4af37; margin-bottom: 8px; font-size: 15px; font-weight: 700; }
    .qty-box { display: flex; align-items: center; gap: 12px; }
    .qty-btn { background: #c5a059; color: #000; border: none; width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
    .qty-btn:hover { background: #d4af37; }
    .qty-num { font-size: 16px; font-weight: bold; min-width: 15px; text-align: center; }
    .remove-btn { background: transparent; color: #ff4444; border: 1px solid #ff4444; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.2s; }
    .remove-btn:hover { background: #ff4444; color: #fff; }
    .total { text-align: center; font-size: 21px; margin-top: 25px; color: #d4af37; font-weight: 700; border-top: 1px dashed rgba(212,175,55,0.3); padding-top: 15px; }
    .checkout-btn { width: 100%; padding: 14px; background: #c5a059; color: #000; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 15px rgba(197, 160, 89, 0.3); transition: 0.25s; }
    .checkout-btn:hover { background: #d4af37; }
    .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: #111; border-top: 1px solid #333; display: flex; justify-content: space-around; padding: 12px 0; z-index: 999; }
    .nav-item { color: #d4af37; text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 14px; opacity: 0.7; }
  </style>
</head>

<body>
  <div class="app-container">
    <h2>السلة</h2>
    <div id="cart"></div>
    <div id="total" class="total"></div>
    <button id="checkoutBtn" class="checkout-btn">إتمام الطلب الفاخر</button>
  </div>

  <div class="bottom-nav">
    <a href="../index.html" class="nav-item"><span>🏠</span><span>الرئيسية</span></a>
    <a href="../menu/index.html?category=hot" class="nav-item"><span>☕</span><span>ساخنة</span></a>
    <a href="../menu/index.html?category=cold" class="nav-item"><span>🥤</span><span>باردة</span></a>
    <a href="../menu/index.html?category=sweets" class="nav-item"><span>🍰</span><span>الحلويات</span></a>
    <a href="#" class="nav-item" style="opacity: 1;"><span>🛒</span><span>السلة</span></a>
  </div>

  <script>
    // تهيئة Supabase بالمفتاح الصحيح الذي زودتني به
    const supabase = supabase.createClient(
      "https://motikwjgfgmegekygswy.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1vdGlrd2pnZmdtZWdla3lnc3d5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNzc4MjQsImV4cCI6MjA5NDk1MzgyNH0.GWGDZ-WvjUeTLmgIfQxt6zDhZwN1C9GCHUh75ggSVdo"
    );

    const params = new URLSearchParams(window.location.search);
    const orderCode = params.get("code");
    let orderId = null;

    async function loadOrderId() {
      if (!orderCode) return;
      const { data } = await supabase.from("orders").select("id").eq("order_code", orderCode).maybeSingle();
      orderId = data?.id;
    }

    async function loadCart() {
      await loadOrderId();
      if (!orderId) return;

      const { data: items } = await supabase.from("order_items").select("*").eq("order_id", orderId);
      const { data: menuItems } = await supabase.from("items").select("*");

      const map = {};
      menuItems?.forEach(p => { map[p.id] = p; });

      const container = document.getElementById("cart");
      container.innerHTML = "";
      let total = 0;

      items?.forEach(it => {
        const p = map[it.item_id] || { name_ar: "منتج", image_url: "" };
        total += it.quantity * it.price;
        const div = document.createElement("div");
        div.className = "cart-item";
        div.innerHTML = `<img src="${p.image_path || 'https://via.placeholder.com/75'}">
          <div class="info"><div class="name">${p.name_ar}</div><div class="price">${it.price} ريال</div>
          <div class="qty-box"><button class="qty-btn" onclick="changeQty('${it.id}', 1)">+</button><span>${it.quantity}</span><button class="qty-btn" onclick="changeQty('${it.id}', -1)">-</button></div></div>
          <button class="remove-btn" onclick="removeItem('${it.id}')">حذف</button>`;
        container.appendChild(div);
      });
      document.getElementById("total").textContent = `المجموع: ${total} ريال`;
    }

    // دوال التعامل مع السلة
    async function changeQty(id, amount) {
      const { data } = await supabase.from("order_items").select("quantity").eq("id", id).maybeSingle();
      if (!data) return;
      let newQty = data.quantity + amount;
      if (newQty <= 0) await removeItem(id);
      else await supabase.from("order_items").update({ quantity: newQty }).eq("id", id);
      loadCart();
    }

    async function removeItem(id) {
      await supabase.from("order_items").delete().eq("id", id);
      loadCart();
    }

    document.getElementById("checkoutBtn").addEventListener("click", async () => {
      window.location.href = `../customer/track.html?code=${orderCode}`;
    });

    loadCart();
  </script>
</body>
</html>
