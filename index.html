<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <title>Ritzy Roast</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: "Tajawal", sans-serif;
      direction: rtl;
      text-align: center;
    }

    /* أزرار أعلى الصفحة */
    .top-buttons {
      position: fixed;
      top: 15px;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 15px;
      z-index: 999;
    }

    .top-btn {
      background: rgba(255,255,255,0.1);
      padding: 8px 14px;
      border-radius: 8px;
      color: #d4af37;
      font-size: 14px;
      border: 1px solid rgba(255,255,255,0.2);
      text-decoration: none;
      backdrop-filter: blur(4px);
    }

    /* الشعار */
    .logo {
      width: 160px;
      margin-top: 90px;
    }

    /* العبارة الترحيبية */
    .welcome {
      margin-top: 15px;
      font-size: 22px;
      color: #d4af37;
    }

    /* صفوف الصور */
    .category {
      margin-top: 25px;
    }

    .category img {
      width: 85%;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.15);
    }

    .category-title {
      margin-top: 8px;
      font-size: 20px;
      color: #d4af37;
    }

    /* الشريط السفلي */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: rgba(255,255,255,0.05);
      padding: 10px 0;
      display: flex;
      justify-content: space-around;
      border-top: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(6px);
    }

    .bottom-btn {
      color: #d4af37;
      text-decoration: none;
      font-size: 16px;
    }
  </style>
</head>

<body>

  <!-- أزرار أعلى الصفحة -->
  <div class="top-buttons">
    <a href="worker/" class="top-btn">دخول العامل</a>
    <a href="#" class="top-btn">تغيير اللغة</a>
  </div>

  <!-- الشعار -->
  <img src="assets/logo.png" class="logo" alt="الشعار">

  <!-- عبارة ترحيبية -->
  <div class="welcome">مرحباً بكم في Ritzy Roast</div>

  <!-- المشروبات الساخنة -->
  <div class="category">
    <img src="assets/hot.jpg" alt="مشروبات ساخنة">
    <div class="category-title">المشروبات الساخنة</div>
  </div>

  <!-- المشروبات الباردة -->
  <div class="category">
    <img src="assets/cold.jpg" alt="مشروبات باردة">
    <div class="category-title">المشروبات الباردة</div>
  </div>

  <!-- الحلى -->
  <div class="category">
    <img src="assets/dessert.jpg" alt="الحلى">
    <div class="category-title">الحلويات</div>
  </div>

  <!-- الشريط السفلي -->
  <div class="bottom-bar">
    <a href="#" class="bottom-btn">الساخن</a>
    <a href="#" class="bottom-btn">البارد</a>
    <a href="#" class="bottom-btn">الحلى</a>
    <a href="#" class="bottom-btn">السلة</a>
  </div>

</body>
</html>
