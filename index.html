<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ritzy Roast - التجربة الفاخرة</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: "Tajawal", sans-serif;
      background: #000;
      color: #fff;
      margin: 0;
      padding: 0;
      direction: rtl;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .welcome-container {
      text-align: center;
      padding: 20px;
      max-width: 400px;
      width: 100%;
    }
    .logo {
      width: 150px;
      height: 150px;
      object-fit: cover;
      border-radius: 50%;
      border: 2px solid #d4af37;
      margin-bottom: 20px;
      box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
    }
    h1 {
      color: #d4af37;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    p {
      opacity: 0.8;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 30px;
    }
    .enter-btn {
      display: inline-block;
      background: #c5a059;
      color: #000;
      text-decoration: none;
      padding: 14px 35px;
      border-radius: 30px;
      font-weight: bold;
      font-size: 18px;
      transition: 0.3s;
      box-shadow: 0 4px 15px rgba(197, 160, 89, 0.4);
    }
    .enter-btn:hover {
      background: #d4af37;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

  <div class="welcome-container">
    <img src="https://motikwjgfgmegekygswy.supabase.co/storage/v1/object/public/products/logo/logo.webp" alt="Ritzy Roast Logo" class="logo">
    <h1>أهلاً بك في Ritzy Roast</h1>
    <p>استمتع بتجربة فريدة ومذاق فاخر لأجود أنواع القهوة والمشروبات المختارة خصيصاً لك.</p>
    <a href="menu/index.html" class="enter-btn">تصفح القائمة الفاخرة ☕</a>
  </div>

</body>
</html>
