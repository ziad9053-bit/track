<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <title>تتبع الطلب</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f8f8f8;
      padding: 40px;
      text-align: center;
      direction: rtl;
    }
    .card {
      background: white;
      padding: 25px;
      border-radius: 12px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .status {
      font-size: 22px;
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>تتبع الطلب</h2>
    <p id="orderId"></p>
    <p class="status" id="status">جاري التحميل...</p>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    // 🔑 Supabase Client
    const supabase = createClient(
      "https://motikwjgfgmegekygswy.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1vdGlrd2pnZmdtZWdla3lnc3d5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNzc4MjQsImV4cCI6MjA5NDk1MzgyNH0.GWGDZ-WvjUeTLmgIfQxt6zDhZwN1C9GCHUh75ggSVdoا"
    );

    // 🟦 استخراج order_id من الرابط
    const urlParams = new URLSearchParams(window.location.search);
    let order_id = urlParams.get("order_id");

    // تنظيف القيمة
    if (order_id) {
      order_id = order_id.trim();
    }

    console.log("Order ID:", order_id);

    // عرض رقم الطلب
    document.getElementById("orderId").textContent =
      "رقم الطلب: " + (order_id || "غير موجود");

    // 🟥 التحقق من صحة order_id
    if (!order_id || order_id === "null" || order_id === "undefined") {
      document.getElementById("status").innerText =
        "خطأ: رابط التتبع غير صحيح أو يفتقد رقم الطلب.";
    } else {
      fetchOrderDetails(order_id);
    }

    // 🟩 دالة جلب بيانات الطلب
    async function fetchOrderDetails(id) {
      try {
        const { data, error } = await supabase
          .from("orders")
          .select("*")
          .eq("id", id)
          .single();

        if (error) throw error;

        if (data) {
          document.getElementById("status").innerText =
            "حالة الطلب: " + data.status;
        } else {
          document.getElementById("status").innerText =
            "الطلب غير موجود.";
        }
      } catch (err) {
        console.error("Supabase Error:", err.message);
        document.getElementById("status").innerText =
          "خطأ في جلب بيانات الطلب.";
      }
    }
  </script>

</body>
</html>
