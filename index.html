<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <title>الصفحة الرئيسية</title>

  <style>
    body {
      font-family: "Tajawal", sans-serif;
      background: #000;
      color: #fff;
      margin: 0;
      padding: 0;
      direction: rtl;
      text-align: center;
    }

    .header {
      padding: 25px 0;
    }

    .logo {
      width: 160px;
      margin-top: 20px;
    }

    .section {
      margin-top: 40px;
    }

    .btn {
      display: block;
      margin: 15px auto;
      padding: 15px 25px;
      width: 70%;
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      color: #d4af37;
      font-size: 20px;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.15);
      transition: 0.2s;
    }

    .btn:hover {
      background: rgba(255,255,255,0.18);
    }

    /* زر دخول الموظف */
    .staff-btn {
      position: fixed;
      top: 15px;
      left: 15px;
      background: rgba(255,255,255,0.1);
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 14px;
      color: #d4af37;
      text-decoration: none;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.2);
      z-index: 999;
      cursor: pointer;
    }

    /* نافذة إدخال الرقم السري */
    .pin-box {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .pin-content {
      background: rgba(255,255,255,0.08);
      padding: 25px;
      border-radius: 12px;
      width: 300px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .pin-input {
      width: 80%;
      padding: 12px;
      font-size: 20px;
      text-align: center;
      border-radius: 8px;
      border: none;
      margin-top: 10px;
    }

    .pin-btn {
      margin-top: 15px;
      padding: 10px 20px;
      width: 100%;
      background: #d4af37;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
    }

    .pin-error {
      color: #ff4444;
      margin-top: 10px;
      font-size: 14px;
      display: none;
    }
  </style>
</head>

<body>

  <!-- زر دخول الموظف -->
  <div class="staff-btn" onclick="openPin()">دخول الموظف</div>

  <!-- نافذة الرقم السري -->
  <div class="pin-box" id="pinBox">
    <div class="pin-content">
      <h3 style="color:#d4af37;">أدخل الرقم السري</h3>
      <input type="password" id="pinInput" class="pin-input" maxlength="4" placeholder="••••" />
      <div id="pinError" class="pin-error">الرقم السري غير صحيح</div>
      <button class="pin-btn" onclick="checkPin()">دخول</button>
    </div>
  </div>

  <div class="header">
    <img src="assets/logo.png" class="logo" alt="الشعار" />
  </div>

  <div class="section">
    <a href="menu/?category=hot" class="btn">المشروبات الساخنة</a>
    <a href="menu/?category=cold" class="btn">المشروبات الباردة</a>
    <a href="menu/?category=sweets" class="btn">الحلويات</a>
  </div>

  <script>
    function openPin() {
      document.getElementById("pinBox").style.display = "flex";
      document.getElementById("pinInput").value = "";
      document.getElementById("pinError").style.display = "none";
    }

    function checkPin() {
      const pin = document.getElementById("pinInput").value;

      if (pin === "2244") {
        window.location.href = "staff/";
      } else {
        document.getElementById("pinError").style.display = "block";
      }
    }
  </script>

</body>
</html>
