<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <title>تتبع الطلب</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f8f8f8;
      padding: 40px;
      text-align: center;
      direction: rtl;
    }
    .card {
      background: white;
      padding: 25px;
      border-radius: 12px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .status {
      font-size: 22px;
      margin-top: 10px;
      font-weight: bold;
    }
    .loading {
      color: #888;
      font-size: 18px;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>تتبع الطلب</h2>
    <p id="orderId"></p>
    <p class="status" id="status">جاري التحميل...</p>
    <img id="qr" width="200" style="margin-top:20px" />
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    // إعداد Supabase
    const supabase = createClient(
      "https://motikwjgfgmegekygswy.supabase.co",
      "sb_secret_7iCE4Xa8jrLFQrq0gs_bTw_6t9vt5E4"
    );

    // قراءة order_id من الرابط
    const urlParams = new URLSearchParams(window.location.search);
    const order_id = urlParams.get("order_id");

    document.getElementById("orderId").textContent = "رقم الطلب: " + order_id;

    function renderStatus(status) {
      return status === "pending" ? "قيد الانتظار" :
             status === "preparing" ? "جاري التحضير" :
             status === "ready" ? "جاهز للاستلام" :
             status;
    }

    async function loadOrder() {
      const { data, error } = await supabase
        .from("orders")
        .select("*")
        .eq("id", order_id)
        .single();

      if (error) {
        document.getElementById("status").textContent = "خطأ في جلب البيانات";
        return;
      }

      document.getElementById("status").textContent = renderStatus(data.status);

      // QR
      document.getElementById("qr").src =
        `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(window.location.href)}`;
    }

    // تحميل أول مرة
    loadOrder();

    // 🔥 Realtime — تحديث مباشر بدون تحديث الصفحة
    supabase
      .channel("order-status-" + order_id)
      .on(
        "postgres_changes",
        {
          event: "UPDATE",
          schema: "public",
          table: "orders",
          filter: "id=eq." + order_id
        },
        (payload) => {
          const newStatus = payload.new.status;
          document.getElementById("status").textContent = renderStatus(newStatus);
        }
      )
      .subscribe();
  </script>

</body>
</html>
