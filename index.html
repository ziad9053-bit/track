<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <title>Ritzy Roast</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: "Tajawal", sans-serif;
      direction: rtl;
      text-align: center;
      overflow-x: hidden;
    }

    /* تأثيرات عامة */
    .fade {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeIn 1s ease forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* أزرار أعلى الصفحة */
    .top-buttons {
      position: fixed;
      top: 15px;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 18px;
      z-index: 999;
    }

    .top-btn {
      background: rgba(255,255,255,0.08);
      padding: 10px 18px;
      border-radius: 12px;
      color: #d4af37;
      font-size: 15px;
      border: 1px solid rgba(255,255,255,0.18);
      text-decoration: none;
      backdrop-filter: blur(8px);
      box-shadow: 0 0 14px rgba(212,175,55,0.25);
      transition: 0.25s;
    }

    .top-btn:hover {
      background: rgba(255,255,255,0.18);
      transform: scale(1.05);
    }

    /* الشعار */
    .logo {
      width: 170px;
      margin-top: 110px;
      filter: drop-shadow(0 0 14px rgba(212,175,55,0.35));
      animation-delay: 0.2s;
    }

    /* العبارة الترحيبية */
    .welcome {
      margin-top: 18px;
      font-size: 24px;
      color: #d4af37;
      font-weight: 600;
      text-shadow: 0 0 8px rgba(212,175,55,0.35);
      animation-delay: 0.4s;
    }

    /* صفوف الصور */
    .category {
      margin-top: 35px;
    }

    .category img {
      width: 88%;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 0 22px rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);
      transition: 0.3s;
    }

    .category img:hover {
      transform: scale(1.03);
      box-shadow: 0 0 28px rgba(212,175,55,0.25);
    }

    .category-title {
      margin-top: 10px;
      font-size: 21px;
      color: #d4af37;
      font-weight: 500;
      animation-delay: 0.6s;
    }

    /* الشريط السفلي */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: rgba(255,255,255,0.05);
      padding: 12px 0;
      display: flex;
      justify-content: space-around;
      border-top: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      box-shadow: 0 -4px 14px rgba(0,0,0,0.4);
    }

    .bottom-btn {
      color: #d4af37;
      text-decoration: none;
      font-size: 17px;
      font-weight: 500;
      transition: 0.2s;
    }

    .bottom-btn:hover {
      transform: scale(1.1);
    }
  </style>
</head>

<body>

  <!-- أزرار أعلى الصفحة -->
 <div class="top-buttons fade">
    <a href="staff/login.html" class="top-btn">دخول العامل</a>
    <a href="#" class="top-btn">تغيير اللغة</a>
</div>

  <!-- الشعار -->
  <img src="assets/logo.png" class="logo fade" alt="الشعار">

  <!-- عبارة ترحيبية -->
  <div class="welcome fade">مرحباً بكم في Ritzy Roast</div>

  <!-- المشروبات الساخنة -->
  <div class="category fade">
    <img src="assets/hot.jpg" alt="مشروبات ساخنة">
    <div class="category-title">المشروبات الساخنة</div>
  </div>

  <!-- المشروبات الباردة -->
  <div class="category fade">
    <img src="assets/cold.jpg" alt="مشروبات باردة">
    <div class="category-title">المشروبات الباردة</div>
  </div>

  <!-- الحلى -->
  <div class="category fade">
    <img src="assets/dessert.jpg" alt="الحلى">
    <div class="category-title">الحلويات</div>
  </div>

  <!-- الشريط السفلي -->
  <div class="bottom-bar fade">
    <a href="#" class="bottom-btn">الساخن</a>
    <a href="#" class="bottom-btn">البارد</a>
    <a href="#" class="bottom-btn">الحلى</a>
    <a href="#" class="bottom-btn">السلة</a>
  </div>

</body>
</html>
