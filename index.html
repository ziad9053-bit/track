<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ritzy Roast</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0; padding: 0; background: #000; color: #fff;
      font-family: "Tajawal", sans-serif; direction: rtl; text-align: center;
      overflow-x: hidden; padding-bottom: 100px;
      display: flex; justify-content: center;
    }

    .app-container { width: 100%; max-width: 480px; padding: 0 16px; box-sizing: border-box; }

    .fade { opacity: 0; transform: translateY(15px); animation: fadeIn 0.8s ease forwards; }
    @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

    .top-buttons {
      display: flex; justify-content: space-between;
      margin-top: 20px; margin-bottom: 30px; gap: 12px;
    }

    .top-btn {
      flex: 1; background: #c5a059; padding: 10px 14px; border-radius: 8px;
      color: #000; font-size: 14px; font-weight: bold; text-decoration: none;
      box-shadow: 0 4px 10px rgba(197, 160, 89, 0.2);
      transition: 0.25s; display: flex; align-items: center; justify-content: center; gap: 6px;
    }

    .top-btn:hover { background: #d4af37; transform: translateY(-2px); }

    .logo-container { margin-top: 10px; display: inline-block; position: relative; }
    .logo-img {
      width: 110px; height: 110px; border-radius: 50%; object-fit: cover;
      border: 2px solid #d4af37; box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
    }

    .brand-title {
      font-size: 32px; color: #d4af37; font-weight: 700;
      letter-spacing: 1px; margin: 15px 0 5px 0; text-transform: uppercase;
    }

    .welcome-subtitle { font-size: 20px; color: #d4af37; font-weight: 500; margin-bottom: 35px; }

    .card-luxury {
      width: 100%; height: 125px; border-radius: 14px; border: 1px solid #c5a059;
      margin-bottom: 20px; position: relative; overflow: hidden;
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
      transition: transform 0.3s, box-shadow 0.3s;
      cursor: pointer; display: block; text-decoration: none;
    }

    .card-luxury::before {
      content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background-size: cover; background-position: center;
      background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
        url('https://motikwjgfgmegekygswy.supabase.co/storage/v1/object/public/products/logo/logo.webp');
      transition: transform 0.5s; z-index: 1;
    }

    .card-luxury:hover::before { transform: scale(1.05); }
    .card-luxury:hover { box-shadow: 0 0 25px rgba(212, 175, 55, 0.35); }

    .card-content {
      position: relative; z-index: 2; height: 100%;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; box-sizing: border-box;
    }

    .card-right {
      display: flex; align-items: center; gap: 10px;
      color: #d4af37; font-size: 22px; font-weight: 600;
      text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
    }

    .card-left-indicator {
      width: 24px; height: 24px; border: 2px solid #d4af37;
      clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%);
      background: rgba(0, 0, 0, 0.3);
    }

    .bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px; background: #111; border-top: 1px solid #333;
      display: flex; justify-content: space-around; padding: 12px 0; z-index: 999;
    }

    .nav-item {
      color: #d4af37; font-size: 14px; text-decoration: none; font-weight: 600;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      opacity: 0.8; transition: 0.2s;
    }

    .nav-item:hover, .nav-item.active { opacity: 1; transform: scale(1.05); }
  </style>
</head>

<body>

  <div class="app-container">

    <div class="top-buttons fade">
      <a href="#" id="langBtn" class="top-btn">🌐 تغيير اللغة</a>
      <a href="staff/login.html" id="staffBtn" class="top-btn">👤 دخول العامل</a>
    </div>

    <div class="logo-container fade" style="animation-delay: 0.1s;">
      <img src="https://motikwjgfgmegekygswy.supabase.co/storage/v1/object/public/products/logo/logo.webp" class="logo-img">
    </div>

    <h1 class="brand-title fade" style="animation-delay: 0.2s;">RITZY ROAST</h1>
    <div class="welcome-subtitle fade" style="animation-delay: 0.3s;">تجربة قهوة فاخرة</div>

    <a href="menu/index.html?category=hot" class="card-luxury fade">
      <div class="card-content">
        <div class="card-right">☕ <span>مشروبات ساخنة</span></div>
        <div class="card-left-indicator"></div>
      </div>
    </a>

    <a href="menu/index.html?category=cold" class="card-luxury fade">
      <div class="card-content">
        <div class="card-right">🥤 <span>مشروبات باردة</span></div>
        <div class="card-left-indicator"></div>
      </div>
    </a>

    <a href="menu/index.html?category=sweets" class="card-luxury fade">
      <div class="card-content">
        <div class="card-right">🍰 <span>الحلويات</span></div>
        <div class="card-left-indicator"></div>
      </div>
    </a>

  </div>

  <div class="bottom-nav">
    <a href="#" class="nav-item active">🏠 <span>الرئيسية</span></a>
    <a href="menu/index.html?category=hot" class="nav-item">☕ <span>ساخنة</span></a>
    <a href="menu/index.html?category=cold" class="nav-item">🥤 <span>باردة</span></a>
    <a href="menu/index.html?category=sweets" class="nav-item">🍰 <span>الحلويات</span></a>
    <a href="cart/index.html" class="nav-item">🛒 <span>السلة</span></a>
  </div>

  <script>
    // تمرير كود الطلب لجميع الروابط إن وجد
    const codeValue = new URLSearchParams(window.location.search).get("code");

    if (codeValue) {
      document.querySelectorAll("a").forEach(link => {
        const href = link.getAttribute("href");

        if (!href || href === "#" || href.includes("staff")) return;

        const url = new URL(href, window.location.href);
        url.searchParams.set("code", codeValue);
        link.href = url.toString();
      });
    }
  </script>

</body>
</html>
