<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <title>تتبع الطلب</title>

  <style>
    body {
      font-family: "Tajawal", sans-serif;
      background: #000;
      color: #fff;
      padding: 40px 15px;
      text-align: center;
      direction: rtl;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      padding: 25px;
      border-radius: 15px;
      max-width: 430px;
      margin: auto;
      box-shadow: 0 0 25px rgba(212, 175, 55, 0.3);
      backdrop-filter: blur(6px);
    }

    h2 {
      color: #d4af37;
      font-size: 26px;
      margin-bottom: 10px;
    }

    .label {
      color: #d4af37;
      font-size: 18px;
      margin-top: 10px;
    }

    .status-box {
      margin-top: 10px;
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 20px;
      font-weight: bold;
      display: inline-block;
      color: #000;
    }

    .s-pending { background: #f0ad4e; }
    .s-preparing { background: #0275d8; color: #fff; }
    .s-ready { background: #5cb85c; }
    .s-served { background: #6c757d; color: #fff; }

    #qr-box {
      margin-top: 18px;
    }

    #qr-box img {
      width: 220px;
      height: 220px;
      border-radius: 12px;
    }

    .info-box {
      margin-top: 18px;
      text-align: right;
      font-size: 15px;
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 12px;
    }

    .info-box ul {
      margin: 5px 0 0 0;
      padding-right: 20px;
    }

    .info-box li {
      margin-bottom: 4px;
    }

    .time-badge {
      margin-top: 8px;
      font-size: 13px;
      color: #ccc;
    }

    .hint {
      margin-top: 10px;
      font-size: 14px;
      color: #bbb;
    }
  </style>
</head>

<body>

  <div class="card">
    <h2>تتبع الطلب</h2>

    <p class="label">رقم الطلب:</p>
    <p id="orderId" style="font-size:18px; color:#fff;"></p>

    <p class="label">حالة الطلب:</p>
    <div id="status" class="status-box s-pending">جاري التحميل...</div>

    <div id="qr-box"></div>

    <div class="time-badge" id="timer"></div>

    <div class="info-box" id="details"></div>

    <p class="hint" id="hint"></p>
  </div>

  <!-- صوت بسيط عند الجاهزية -->
  <audio id="readySound">
    <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
  </audio>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabase = createClient(
      "https://motikwjgfgmegekygswy.supabase.co",
      "sb_publishable_yjL5niVoL8Rtr2gF4i2J1w_T1TCjpEI"
    );

    const urlParams = new URLSearchParams(window.location.search);
    let order_id = urlParams.get("order_id");
    if (order_id) order_id = order_id.trim();

    document.getElementById("orderId").textContent =
      order_id || "غير موجود";

    let lastStatus = null;
    let createdAt = null;

    if (!order_id || order_id === "null" || order_id === "undefined") {
      document.getElementById("status").innerText =
        "خطأ: رابط التتبع غير صحيح.";
    } else {
      fetchOrderDetails(order_id);
      setInterval(() => fetchOrderDetails(order_id), 3000);
    }

    function formatDuration(createdAt) {
      if (!createdAt) return "";
      const created = new Date(createdAt);
      const now = new Date();
      const diffMs = now - created;
      const diffSec = Math.floor(diffMs / 1000);
      const min = Math.floor(diffSec / 60);
      const sec = diffSec % 60;
      return `${min} دقيقة و ${sec} ثانية`;
    }

    async function fetchOrderDetails(id) {
      try {
        const { data, error } = await supabase
          .from("orders")
          .select("*")
          .eq("id", id)
          .single();

        if (error) throw error;

        if (data) {
          updateUI(data);
        } else {
          document.getElementById("status").innerText =
            "الطلب غير موجود.";
        }
      } catch (err) {
        document.getElementById("status").innerText =
          "خطأ في جلب بيانات الطلب.";
      }
    }

    function updateUI(order) {
      const box = document.getElementById("status");
      box.innerText = order.status;
      box.className = "status-box s-" + order.status;

      // صوت عند الجاهزية مرة واحدة فقط
      if (order.status === "ready" && lastStatus !== "ready") {
        document.getElementById("readySound").play().catch(() => {});
      }
      lastStatus = order.status;

      // QR: نفس رابط التتبع الحالي
      const qrDiv = document.getElementById("qr-box");
      const color = order.status === "ready" ? "00c853"
                  : order.status === "served" ? "6c757d"
                  : "d4af37";

      qrDiv.innerHTML = `
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&color=${color}&bgcolor=000000&data=${encodeURIComponent(window.location.href)}" alt="QR" />
      `;

      // الأصناف من حقل items
      let itemsView = "لا يوجد";
      if (order.items) {
        try {
          const parsed = typeof order.items === "string"
            ? JSON.parse(order.items)
            : order.items;

          if (Array.isArray(parsed)) {
            itemsView = "<ul>" + parsed.map(i => `<li>${i}</li>`).join("") + "</ul>";
          } else {
            itemsView = String(order.items);
          }
        } catch {
          itemsView = String(order.items);
        }
      }

      const details = document.getElementById("details");
      details.innerHTML = `
        <p><strong>ملخص الطلب:</strong>${itemsView}</p>
        <p><strong>السعر الكلي:</strong> ${order.total_price != null ? order.total_price + " ريال" : "غير محدد"}</p>
        <p><strong>رقم الطاولة:</strong> ${order.table_number != null ? order.table_number : "غير محدد"}</p>
        <p><strong>الملاحظات:</strong> ${order.notes || "لا يوجد"}</p>
      `;

      if (!createdAt) createdAt = order.created_at;
      document.getElementById("timer").innerText =
        createdAt ? "منذ: " + formatDuration(createdAt) : "";

      const hint = document.getElementById("hint");
      if (order.status === "pending" || order.status === "preparing") {
        hint.textContent = "طلبك قيد التجهيز، يمكنك إغلاق الصفحة والعودة لاحقًا لنفس الرابط.";
      } else if (order.status === "ready") {
        hint.textContent = "طلبك جاهز! تفضل لاستلامه من الباريستا.";
      } else if (order.status === "served") {
        hint.textContent = "تم استلام الطلب، شكرًا لاختيارك لنا.";
      } else {
        hint.textContent = "";
      }
    }
  </script>

</body>
</html>
