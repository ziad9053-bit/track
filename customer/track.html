<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <title>طلبك</title>

  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #000;
      color: #fff;
      font-family: "Tajawal", sans-serif;
      direction: rtl;
      text-align: center;
      padding-bottom: 90px;
    }

    h2 {
      color: #d4af37;
      font-size: 26px;
      margin-bottom: 10px;
    }

    .qr-box img {
      width: 220px;
      border-radius: 12px;
      box-shadow: 0 0 25px rgba(212,175,55,0.4);
    }

    .ready {
      color: #5cb85c;
      font-size: 26px;
      font-weight: bold;
    }

    .pending {
      color: #f0ad4e;
      font-size: 22px;
    }

    .summary-box {
      margin-top: 30px;
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      text-align: right;
    }

    .item {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
      gap: 10px;
    }

    .item img {
      width: 55px;
      height: 55px;
      border-radius: 8px;
      object-fit: cover;
    }

    .table-number {
      margin-top: 15px;
      font-size: 20px;
      color: #d4af37;
      text-align: center;
    }

    /* الشريط السفلي */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #111;
      border-top: 1px solid #333;
      display: flex;
      justify-content: space-around;
      padding: 12px 0;
      z-index: 999;
    }

    .nav-item {
      color: #d4af37;
      font-size: 16px;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>

<body>

  <h2>طلبك</h2>

  <div id="orderIdBox"></div>

  <div class="qr-box">
    <img id="qrImage" src="">
  </div>

  <div id="statusBox"></div>

  <div id="summaryBox" class="summary-box"></div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabase = createClient(
      "https://motikwjgfgmegekygswy.supabase.co",
      "ضع_المفتاح_هنا"
    );

    const code = new URLSearchParams(window.location.search).get("code");

    document.getElementById("orderIdBox").innerHTML =
      `<div style="font-size:20px;">رقم الطلب: <strong>${code}</strong></div>`;

    const qrGold = `https://api.qrserver.com/v1/create-qr-code/?size=220x220&color=212-175-55&data=${code}`;
    const qrGreen = `https://api.qrserver.com/v1/create-qr-code/?size=220x220&color=0-255-0&data=${code}`;

    const qrImage = document.getElementById("qrImage");
    qrImage.src = qrGold;

    let lastStatus = "pending";

    async function loadOrder() {
      const { data: order } = await supabase
        .from("orders")
        .select("*")
        .eq("order_code", code)
        .maybeSingle();

      if (!order) return;

      // جلب الأصناف
      const { data: items } = await supabase
        .from("order_items")
        .select("*")
        .eq("order_id", order.id);

      // جلب المنتجات
      const { data: products } = await supabase
        .from("products")
        .select("*");

      const map = {};
      products.forEach(p => {
        const { data: imgData } = supabase
          .storage
          .from("products")
          .getPublicUrl(p.image_path);

        map[p.id] = {
          ...p,
          image_url: imgData.publicUrl
        };
      });

      render(order, items, map);
    }

    function render(order, items, map) {
      // الحالة
      if (order.status === "pending") {
        document.getElementById("statusBox").innerHTML =
          `<div class="pending">طلبك قيد التحضير…</div>`;
      }

      if (order.status === "ready") {
        document.getElementById("statusBox").innerHTML =
          `<div class="ready">✔ طلبك جاهز للاستلام</div>`;
        qrImage.src = qrGreen;
      }

      // الملخص
      const box = document.getElementById("summaryBox");
      box.innerHTML = `<div class="summary-title">ملخص الطلب</div>`;

      items.forEach(it => {
        const p = map[it.item_id];

        box.innerHTML += `
          <div class="item">
            <img src="${p.image_url}">
            <div>
              <div class="item-name">${p.name_ar}</div>
              <div class="item-price">${it.price} ريال × ${it.quantity}</div>
            </div>
          </div>
        `;
      });

      box.innerHTML += `<div class="table-number">طاولة ${order.table_number}</div>`;
    }

    loadOrder();
    setInterval(loadOrder, 3000);
  </script>

  <!-- الشريط السفلي -->
  <div class="bottom-nav">
    <a href="../menu/?category=hot&code=<?=code?>" class="nav-item">☕ ساخن</a>
    <a href="../menu/?category=cold&code=<?=code?>" class="nav-item">🥤 بارد</a>
    <a href="../menu/?category=sweets&code=<?=code?>" class="nav-item">🍰 حلى</a>
    <a href="../cart/?code=<?=code?>" class="nav-item">🛒 السلة</a>
    <a href="track.html?code=<?=code?>" class="nav-item">📍 تتبع</a>
  </div>

  <script>
    const codeValue = new URLSearchParams(window.location.search).get("code");
    document.querySelectorAll(".nav-item").forEach(link => {
      link.href = link.href.replace("<?=code?>", codeValue);
    });
  </script>

</body>
</html>
