<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <title>تتبع الطلب - Ritzy Roast</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body{margin:0;padding:0;background:#000;color:#fff;font-family:"Tajawal",sans-serif;direction:rtl;text-align:center}
    .wrap{padding:30px 16px}
    .order-code{font-size:22px;color:#d4af37;margin-bottom:10px;font-weight:700}

    .qr-box{
      margin:20px auto;
      width:230px;height:230px;
      border-radius:18px;
      border:3px solid #ffd54a;
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 0 18px rgba(255,213,74,.5);
      transition:.3s;
    }
    .qr-box.ready{
      border-color:#00ff55;
      box-shadow:0 0 22px #00ff55;
      transform:scale(1.05);
    }

    .qr-placeholder{
      width:190px;height:190px;
      background:repeating-linear-gradient(45deg,#222 0,#222 4px,#333 4px,#333 8px);
      border-radius:12px;
    }

    .status-text{margin-top:14px;font-size:17px;line-height:1.7}

    .summary{
      margin-top:26px;text-align:right;
      max-width:420px;margin-inline:auto;
      background:rgba(255,255,255,.04);
      border-radius:16px;padding:16px;
      border:1px solid rgba(255,255,255,.08)
    }
    .summary-title{font-size:18px;color:#d4af37;margin-bottom:10px;font-weight:700}

    .item-row{display:flex;justify-content:space-between;margin-bottom:8px;font-size:15px}

    .total{margin-top:10px;font-size:17px;text-align:left;direction:ltr;font-weight:700}
    .table-num{margin-top:8px;font-size:15px;opacity:.8}
  </style>
</head>

<body>

  <div class="wrap">

    <div id="orderCode" class="order-code"></div>

    <div id="qrBox" class="qr-box">
      <div class="qr-placeholder"></div>
    </div>

    <div id="statusText" class="status-text">
      طلبك قيد التجهيز...  
      انتظر تحول الكيو آر إلى اللون الأخضر عند تجهيز طلبك
    </div>

    <div class="summary">
      <div class="summary-title">ملخص الطلب</div>
      <div id="itemsContainer"></div>
      <div id="totalText" class="total"></div>
      <div id="tableText" class="table-num"></div>
    </div>

  </div>

  <audio id="readySound" src="../sounds/order-ready.mp3"></audio>

  <script>
    const db = supabase.createClient("YOUR_URL","YOUR_KEY");

    let lastStatus = null;

    function getCode(){
      const p = new URLSearchParams(window.location.search);
      return p.get("code") || p.get("id");
    }

    async function loadOrder(){
      const code = getCode();
      if(!code){
        document.getElementById("statusText").innerText = "لا يوجد رقم طلب في الرابط.";
        return;
      }

      document.getElementById("orderCode").innerText = "رقم الطلب: " + code;

      const { data: order } = await db
        .from("orders")
        .select("*")
        .eq("order_code", code)
        .maybeSingle();

      if(!order){
        document.getElementById("statusText").innerText = "لم يتم العثور على هذا الطلب.";
        return;
      }

      const { data: orderItems } = await db
        .from("order_items")
        .select("*")
        .eq("order_id", order.id);

      const { data: products } = await db
        .from("products")
        .select("*");

      const map = {};
      (products||[]).forEach(p => map[p.id] = p);

      render(order, orderItems||[], map);
    }

    function render(order, items, map){
      const qrBox = document.getElementById("qrBox");
      const statusText = document.getElementById("statusText");
      const itemsContainer = document.getElementById("itemsContainer");
      const totalText = document.getElementById("totalText");
      const tableText = document.getElementById("tableText");

      if(order.status === "ready"){
        qrBox.classList.add("ready");
        statusText.innerText = "طلبك جاهز! تفضل واستلم طلبك.";

        if(lastStatus !== "ready"){
          document.getElementById("readySound").play().catch(()=>{});
        }
      } else {
        qrBox.classList.remove("ready");
        statusText.innerText = "طلبك قيد التجهيز... انتظر تحول الكيو آر إلى اللون الأخضر عند تجهيز طلبك";
      }

      lastStatus = order.status;

      itemsContainer.innerHTML = "";
      items.forEach(it=>{
        const p = map[it.item_id] || {};
        const name = p.name_ar || p.name_en || it.item_id;
        const price = it.price ?? p.price;

        itemsContainer.innerHTML += `
          <div class="item-row">
            <div>${name}</div>
            <div>x${it.quantity}${price ? " | " + price : ""}</div>
          </div>
        `;
      });

      totalText.innerText = order.total ? `المجموع: ${order.total}` : "";
      tableText.innerText = order.table_number ? `طاولة: ${order.table_number}` : "";
    }

    loadOrder();
    setInterval(loadOrder, 5000);
  </script>

</body>
</html>
