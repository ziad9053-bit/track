<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

  const supabase = createClient(
    "https://motikwjgfgmegekygswy.supabase.co",
    "sb_publishable_yjL5niVoL8Rtr2gF4i2J1w_T1TCjpEI"
  );

  const statusBox = document.getElementById("statusBox");
  const orderIdBox = document.getElementById("orderIdBox");
  const summaryBox = document.getElementById("summaryBox");
  const qrImage = document.getElementById("qrImage");

  // حماية: لو عنصر ناقص → لا تكمل
  if (!statusBox || !orderIdBox || !summaryBox || !qrImage) {
    document.body.innerHTML = "<h2>خطأ: عناصر الصفحة غير موجودة.</h2>";
    throw new Error("Missing HTML elements");
  }

  const code = new URLSearchParams(window.location.search).get("code");

  if (!code) {
    statusBox.innerHTML = `<div class="error-msg">عذرًا، رابط التتبع غير صحيح أو يفتقد رمز الطلب.</div>`;
    qrImage.style.display = "none";
    summaryBox.style.display = "none";
  } else {
    orderIdBox.innerHTML =
      `<div style="font-size:20px; margin-bottom:15px;">رقم الطلب: <strong>${code}</strong></div>`;
  }

  const qrGold = code
    ? `https://api.qrserver.com/v1/create-qr-code/?size=220x220&color=212-175-55&data=${code}`
    : "";
  const qrGreen = code
    ? `https://api.qrserver.com/v1/create-qr-code/?size=220x220&color=0-255-0&data=${code}`
    : "";

  if (code) qrImage.src = qrGold;

  async function loadOrder() {
    if (!code) return;

    try {
      // 1. جلب الطلب
      const { data: order, error: orderError } = await supabase
        .from("orders")
        .select("*")
        .eq("order_code", code)
        .maybeSingle();

      if (orderError) throw orderError;

      if (!order) {
        statusBox.innerHTML = `<div class="error-msg">الطلب غير موجود حالياً، تأكد من صحة الرابط.</div>`;
        summaryBox.style.display = "none";
        return;
      }

      // 2. جلب العناصر
      const { data: items, error: itemsError } = await supabase
        .from("order_items")
        .select("*")
        .eq("order_id", order.id);

      if (itemsError) throw itemsError;

      // 3. جلب المنتجات
      const { data: menuItems, error: menuError } = await supabase
        .from("items")
        .select("*");

      if (menuError) throw menuError;

      const map = {};
      if (menuItems) {
        menuItems.forEach(p => {
          const imgPath = p.image_path || p.image_url;
          let finalUrl = "https://via.placeholder.com/55";

          if (imgPath) {
            if (imgPath.startsWith("http")) {
              finalUrl = imgPath;
            } else {
              const { data } = supabase.storage.from("products").getPublicUrl(imgPath);
              if (data) finalUrl = data.publicUrl;
            }
          }

          map[p.id] = {
            ...p,
            image_url: finalUrl
          };
        });
      }

      render(order, items || [], map);

    } catch (err) {
      console.error("خطأ أثناء تحديث البيانات:", err);
      statusBox.innerHTML = `<div class="error-msg">حدث خطأ أثناء جلب حالة الطلب، حاول تحديث الصفحة.</div>`;
    }
  }

  function render(order, items, map) {
    // الحالة
    if (order.status === "pending" || order.status === "Preparing") {
      statusBox.innerHTML = `<div class="pending">⏳ طلبك قيد التحضير الآن…</div>`;
      qrImage.src = qrGold;
    } else if (order.status === "ready" || order.status === "Ready") {
      statusBox.innerHTML = `<div class="ready">✔ طلبك جاهز للاستلام، بالعافية!</div>`;
      qrImage.src = qrGreen;
    } else {
      statusBox.innerHTML = `<div class="pending">حالة الطلب: ${order.status}</div>`;
      qrImage.src = qrGold;
    }

    // الملخص
    summaryBox.style.display = "block";
    summaryBox.innerHTML = `<div class="summary-title">ملخص الطلب</div>`;

    if (!items.length) {
      summaryBox.innerHTML += `<div style="color:#aaa;">لا توجد أصناف مسجلة في هذا الطلب حتى الآن.</div>`;
    } else {
      items.forEach(it => {
        const p = map[it.item_id] || {
          name_ar: "منتج غير معروف",
          image_url: "https://via.placeholder.com/55"
        };

        summaryBox.innerHTML += `
          <div class="item">
            <img src="${p.image_url}" onerror="this.src='https://via.placeholder.com/55'">
            <div>
              <div class="item-name" style="font-weight:600;">${p.name_ar}</div>
              <div class="item-price" style="color:#aaa; font-size:14px;">
                ${it.price} ريال × ${it.quantity}
              </div>
            </div>
          </div>
        `;
      });
    }

    summaryBox.innerHTML += `<div class="table-number">طاولة ${order.table_number || "غير محددة"}</div>`;
  }

  if (code) {
    loadOrder();
    setInterval(loadOrder, 3000);
  }
</script>
