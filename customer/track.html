<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

  // استخدم نفس المفتاح الذي يعمل في ملفاتك الأخرى
  const supabase = createClient(
    "https://motikwjgfgmegekygswy.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1vdGlrd2pnZmdtZWdla3lnc3d5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNzc4MjQsImV4cCI6MjA5NDk1MzgyNH0.GWGDZ-WvjUeTLmgIfQxt6zDhZwN1C9GCHUh75ggSVdo"
  );

  const statusBox = document.getElementById("statusBox");
  const orderIdBox = document.getElementById("orderIdBox");
  const summaryBox = document.getElementById("summaryBox");
  const qrImage = document.getElementById("qrImage");

  const code = new URLSearchParams(window.location.search).get("code");

  // إضافة حماية للصور
  const qrGold = `https://api.qrserver.com/v1/create-qr-code/?size=220x220&color=212-175-55&data=${code}`;
  const qrGreen = `https://api.qrserver.com/v1/create-qr-code/?size=220x220&color=0-255-0&data=${code}`;

  if (code) {
    orderIdBox.innerHTML = `<div style="font-size:20px;">رقم الطلب: <strong>${code}</strong></div>`;
    qrImage.src = qrGold;
  }

  let lastStatus = null;

  async function loadOrder() {
    if (!code) return;

    try {
      const { data: order, error } = await supabase
        .from("orders")
        .select("*")
        .eq("order_code", code)
        .maybeSingle();

      if (error || !order) return;

      // تحديث الحالة
      if (order.status !== lastStatus) {
        lastStatus = order.status;
        if (order.status === "pending" || order.status === "Preparing") {
          statusBox.innerHTML = `<div class="pending">⏳ طلبك قيد التحضير…</div>`;
          qrImage.src = qrGold;
        } else if (order.status === "ready" || order.status === "Ready") {
          statusBox.innerHTML = `<div class="ready">✔ طلبك جاهز للاستلام!</div>`;
          qrImage.src = qrGreen;
        }
      }

      // جلب الأصناف (استخدام join لجلب اسم الصنف مباشرة)
      const { data: items } = await supabase
        .from("order_items")
        .select(`
          price, 
          quantity, 
          items (name_ar, image_url)
        `)
        .eq("order_id", order.id);

      summaryBox.innerHTML = `<div class="summary-title">ملخص الطلب</div>`;

      items?.forEach(it => {
        summaryBox.innerHTML += `
          <div class="item">
            <img src="${it.items.image_url || 'https://via.placeholder.com/55'}">
            <div>
              <div style="font-weight:600;">${it.items.name_ar}</div>
              <div style="color:#aaa; font-size:14px;">${it.price} ريال × ${it.quantity}</div>
            </div>
          </div>
        `;
      });

      summaryBox.innerHTML += `<div class="table-number">طاولة ${order.table_no || "غير محددة"}</div>`;

    } catch (err) {
      console.error("خطأ في التتبع:", err);
    }
  }

  loadOrder();
  setInterval(loadOrder, 5000); // زيادة الوقت إلى 5 ثواني لتقليل الضغط على قاعدة البيانات
</script>
