<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>إنشاء طلب - Ritzy Roast</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      background:#000;
      color:#fff;
      font-family:Tajawal;
      direction:rtl;
      text-align:center;
      padding:40px;
      padding-bottom:90px; /* مساحة للشريط السفلي */
    }

    h2 {
      color:#d4af37;
      font-size:26px;
    }

    /* الشريط السفلي */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #111;
      border-top: 1px solid #333;
      display: flex;
      justify-content: space-around;
      padding: 12px 0;
      z-index: 999;
    }

    .nav-item {
      color: #d4af37;
      font-size: 16px;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>

<body>

<h2>جاري إنشاء طلبك...</h2>

<div id="bottomNavContainer"></div>

<script>
const db = supabase.createClient("YOUR_URL","YOUR_KEY");

async function generateOrderCode() {
  const { data } = await db
    .from("orders")
    .select("order_code")
    .order("created_at", { ascending: false })
    .limit(1);

  if (!data || data.length === 0) return "RR-0001";

  const last = data[0].order_code;
  const num = parseInt(last.split("-")[1]);
  return "RR-" + String(num + 1).padStart(4, "0");
}

async function createOrder() {
  const code = await generateOrderCode();

  const { data, error } = await db
    .from("orders")
    .insert({
      order_code: code,
      status: "pending",
      total: 0
    })
    .select()
    .single();

  if (error) {
    document.body.innerHTML = "خطأ في إنشاء الطلب";
    return;
  }

  // إضافة الشريط السفلي بعد إنشاء الطلب
  document.getElementById("bottomNavContainer").innerHTML = `
    <div class="bottom-nav">
      <a href="../menu/?category=hot&code=${code}" class="nav-item">☕ ساخن</a>
      <a href="../menu/?category=cold&code=${code}" class="nav-item">🥤 بارد</a>
      <a href="../menu/?category=sweets&code=${code}" class="nav-item">🍰 حلى</a>
      <a href="../cart/?code=${code}" class="nav-item">🛒 السلة</a>
      <a href="../customer/track.html?code=${code}" class="nav-item">📍 تتبع</a>
    </div>
  `;

  // الانتقال إلى المنيو بعد ثانية
  setTimeout(() => {
    window.location.href = `../menu/?category=hot&code=${code}`;
  }, 800);
}

createOrder();
</script>

</body>
</html>
