<script>
  // نستخدم window.supabase لضمان أننا نستخدم المكتبة التي تم تحميلها عبر script
  // ونعرف المتغير db لاستخدامه في كل الكود بدلاً من supabase لتجنب التصادم
  const db = window.supabase.createClient(
    "https://motikwjgfgmegekygswy.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1vdGlrd2pnZmdtZWdla3lnc3d5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNzc4MjQsImV4cCI6MjA5NDk1MzgyNH0.GWGDZ-WvjUeTLmgIfQxt6zDhZwN1C9GCHUh75ggSVdo"
  );

  const params = new URLSearchParams(window.location.search);
  const tableNumFromQR = params.get("table");

  if (tableNumFromQR) {
    localStorage.removeItem("currentOrderId");
    localStorage.removeItem("currentOrderCode");
  } else {
    if (localStorage.getItem("currentOrderCode")) {
      window.location.href = "../menu/index.html?category=hot&code=" + localStorage.getItem("currentOrderCode");
    }
  }

  async function createOrder() {
    try {
      const loadingEl = document.getElementById("loadingText");
      if (loadingEl) loadingEl.innerHTML = "جاري إنشاء طلبك...";

      let tableNum = parseInt(tableNumFromQR) || 1;
      if (tableNum > 200) tableNum = 1;

      const code = "RR-" + Math.floor(1000 + Math.random() * 9000);

      const { data, error } = await db
        .from("orders")
        .insert({
          order_code: code,
          status: "pending",
          total: 0,
          table_no: tableNum
        })
        .select()
        .single();

      if (error) {
        console.error("Supabase Error:", error);
        if (loadingEl) loadingEl.innerHTML = "خطأ في إنشاء الطلب: " + error.message;
        return;
      }

      localStorage.setItem("currentOrderCode", code);
      localStorage.setItem("currentOrderId", data.id);

      window.location.href = `../menu/index.html?category=hot&code=${code}`;

    } catch (err) {
      console.error(err);
      const loadingEl = document.getElementById("loadingText");
      if (loadingEl) loadingEl.innerHTML = "تعذر الاتصال بالخادم.";
    }
  }

  // التأكد من أن DOM جاهز قبل التنفيذ
  window.onload = createOrder;
</script>
