<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>إنشاء طلب - Ritzy Roast</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      background:#000;
      color:#fff;
      font-family: 'Tajawal', sans-serif;
      direction:rtl;
      text-align:center;
      padding:40px;
      padding-bottom:90px;
    }

    h2 {
      color:#d4af37;
      font-size:26px;
      margin-top: 20vh;
    }

    /* تأثير تحميل فخم (Spinner) */
    .loader {
      border: 4px solid rgba(212, 175, 55, 0.1);
      border-radius: 50%;
      border-top: 4px solid #d4af37;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* الشريط السفلي */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #111;
      border-top: 1px solid #333;
      display: flex;
      justify-content: space-around;
      padding: 12px 0;
      z-index: 999;
    }

    .nav-item {
      color: #d4af37;
      font-size: 16px;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>

<body>

<h2 id="loadingText">جاري تهيئة تجربتك الفاخرة...</h2>
<div class="loader" id="loaderIcon"></div>

<div id="bottomNavContainer"></div>

<script>
// الاتصال بقاعدة بياناتك الحقيقية بشكل مباشر وآمن
const db = supabase.createClient(
  "https://motikwjgfgmegekygswy.supabase.co",
  "sb_publishable_yjL5niVoL8Rtr2gF4i2J1w_T1TCjpEI"
);

async function generateOrderCode() {
  try {
    const { data, error } = await db
      .from("orders")
      .select("order_code")
      .order("created_at", { ascending: false })
      .limit(1);

    if (error) throw error;

    if (!data || data.length === 0 || !data[0].order_code) {
      return "RR-0001";
    }

    const last = data[0].order_code;
    // التحقق من صيانة النص لمنع مشاكل التحويل الرقمي NaN
    const parts = last.split("-");
    if (parts.length < 2) return "RR-0001";

    const num = parseInt(parts[1]);
    if (isNaN(num)) return "RR-0001";

    return "RR-" + String(num + 1).padStart(4, "0");
  } catch (err) {
    console.error("خطأ في قراءة آخر كود:", err.message);
    // كود عشوائي احتياطي كـ Plan B لضمان عدم توقف الزبون مطلقاً
    return "RR-" + Math.floor(1000 + Math.random() * 9000);
  }
}

async function createOrder() {
  const code = await generateOrderCode();

  // جلب رقم الطاولة إن وُجد من الرابط الحالي، لكي لا يضيع
  const currentUrlParams = new URLSearchParams(window.location.search);
  const tableNum = currentUrlParams.get("table") || "1"; 

  const { data, error } = await db
    .from("orders")
    .insert({
      order_code: code,
      status: "pending",
      total: 0,
      table_number: tableNum
    })
    .select()
    .single();

  if (error) {
    console.error("تفاصيل خطأ الإدخال:", error.message);
    document.getElementById("loadingText").innerHTML = "<span style='color:#d9534f;'>عذراً، فشل الاتصال بالسيرفر. يرجى إعادة المحاولة.</span>";
    document.getElementById("loaderIcon").style.display = "none";
    return;
  }

  document.getElementById("loadingText").innerHTML = "تم تجهيز رقم طلبك بنجاح! جاري تحويلك للمنيو...";

  // إضافة الشريط السفلي وتمرير المتغير البرمي النظيف code
  document.getElementById("bottomNavContainer").innerHTML = `
    <div class="bottom-nav">
      <a href="../menu/?category=hot&code=${code}" class="nav-item">☕ ساخن</a>
      <a href="../menu/?category=cold&code=${code}" class="nav-item">🥤 بارد</a>
      <a href="../menu/?category=sweets&code=${code}" class="nav-item">🍰 حلى</a>
      <a href="../cart/?code=${code}" class="nav-item">🛒 السلة</a>
      <a href="../customer/track.html?code=${code}" class="nav-item">📍 تتبع</a>
    </div>
  `;

  // تحويل فوري نظيف للمنيو
  setTimeout(() => {
    window.location.href = `../menu/?category=hot&code=${code}`;
  }, 1000);
}

// تشغيل الدالة فور تحميل الصفحة
createOrder();
</script>

</body>
</html>
